<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3J13LHWFT3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-3J13LHWFT3');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse public youth sports teams on Allplays and explore schedules, live games, replays, and team activity.">
  <link rel="canonical" href="https://allplays.ai/teams.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ALL PLAYS">
  <meta property="og:title" content="Browse Teams - ALL PLAYS">
  <meta property="og:description" content="Browse public youth sports teams on Allplays and explore schedules, live games, replays, and team activity.">
  <meta property="og:url" content="https://allplays.ai/teams.html">
  <link rel="icon" type="image/png" href="img/logo_small.png">
  <title>Browse Teams - ALL PLAYS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eef2ff',
              100: '#e0e7ff',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              800: '#3730a3',
              900: '#312e81'
            }
          }
        }
      }
    }
  </script>
  <script type="module" src="/js/telemetry.js?v=1"></script>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 text-gray-900">
  <div id="header-container"></div>

  <main class="container mx-auto px-4 py-8 md:py-12">
    <!-- Page Header -->
    <div class="mb-8 md:mb-12 text-center">
      <h1
        class="text-3xl md:text-4xl lg:text-5xl font-bold mb-4 bg-gradient-to-r from-primary-600 to-primary-800 bg-clip-text text-transparent">
        Browse Teams
      </h1>
      <p class="text-gray-600 text-base md:text-lg max-w-2xl mx-auto">
        Discover youth sports teams using ALL PLAYS across the country. Find teams in your area or explore what others
        are doing.
      </p>
    </div>

    <!-- Teams Grid -->
    <!-- Search Bar -->
    <div class="mb-8 md:mb-12 max-w-2xl mx-auto">
      <form id="search-form" class="flex items-center space-x-2">
        <input
          type="text"
          id="location-search-input"
          placeholder="Search by city, state, or zip..."
          class="flex-grow px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent"
        />
        <button
          type="submit"
          id="search-button"
          class="px-5 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition font-medium"
        >
          Search
        </button>
        <button
          type="button"
          id="clear-search-button"
          class="px-3 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition font-medium"
        >
          Clear
        </button>
      </form>
    </div>

    <!-- Teams Grid -->
    <div id="teams-list" class="space-y-8">
      <div class="col-span-full text-center text-gray-500 py-12">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600 mx-auto mb-4"></div>
        <p>Loading teams...</p>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script type="module">
    import { discoverPublicTeams } from './js/db.js?v=76';
    import { renderHeader, renderFooter, escapeHtml, getSafeImageUrl, resolveZip } from './js/utils.js?v=9';
    import { checkAuth } from './js/auth.js?v=38';

    checkAuth((user) => {
      // Allow viewing without login - user can be null
      renderHeader(document.getElementById('header-container'), user);
    });

    renderFooter(document.getElementById('footer-container'));

    const searchForm = document.getElementById('search-form');
    const locationSearchInput = document.getElementById('location-search-input');
    const searchButton = document.getElementById('search-button');
    const clearSearchButton = document.getElementById('clear-search-button');
    let browseCursor = null;
    let renderedTeams = [];

    function getLocationSearchValue() {
      return locationSearchInput.value.trim();
    }

    function setSearchPending(isPending) {
      searchButton.disabled = isPending;
      clearSearchButton.disabled = isPending;
      searchButton.classList.toggle('opacity-70', isPending);
      clearSearchButton.classList.toggle('opacity-70', isPending);
    }

    function getStoredLocationLabel(team) {
      const city = String(team.city || '').trim();
      const state = String(team.state || '').trim();
      if (city && state) return `${city}, ${state}`;
      return city || state || '';
    }

    function getTeamLocationLabel(team, zipToLocation = {}) {
      return getStoredLocationLabel(team) || (team.zip && zipToLocation[team.zip]) || '';
    }

    function renderLoadMoreButton(container, { canLoadMore, onClick }) {
      const existing = document.getElementById('load-more-public-teams');
      existing?.remove();
      if (!canLoadMore) return;

      const wrapper = document.createElement('div');
      wrapper.id = 'load-more-public-teams';
      wrapper.className = 'col-span-full flex justify-center';
      wrapper.innerHTML = `
        <button type="button" class="px-5 py-3 rounded-xl border border-gray-300 bg-white text-sm font-semibold text-gray-700 hover:border-primary-300 hover:text-primary-700 transition">
          Load more teams
        </button>
      `;
      wrapper.querySelector('button')?.addEventListener('click', onClick);
      container.appendChild(wrapper);
    }

    async function loadTeams(locationFilter = '', { cursor = null, append = false } = {}) {
      const container = document.getElementById('teams-list');
      setSearchPending(true);
      try {
        const discovery = await discoverPublicTeams(locationFilter
          ? { searchText: locationFilter, pageSize: 24 }
          : { cursor, pageSize: 24 });
        const allTeams = discovery.teams || [];
        browseCursor = locationFilter ? null : (discovery.nextCursor || null);
        // Defense in depth: the query only requests public teams, and this keeps
        // private teams hidden if a stale helper or local test double returns one.
        const teams = allTeams.filter(t => t.isPublic === true);

        if (teams.length === 0 && !append) {
          const emptyMessage = locationFilter
            ? `No public teams found for "${escapeHtml(locationFilter)}".`
            : 'No teams found yet.';
          container.innerHTML = `
            <div class="col-span-full text-center py-16 bg-white rounded-2xl shadow-md border border-gray-200">
              <div class="max-w-md mx-auto">
                <svg class="w-16 h-16 text-gray-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                </svg>
                <p class="text-gray-600 text-lg mb-4">${emptyMessage}</p>
                ${locationFilter ? '' : `<a href="login.html#signup" class="inline-block px-6 py-3 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition font-medium">
                  Create the First Team
                </a>`}
              </div>
            </div>
          `;
          return;
        }

        renderedTeams = append ? [...renderedTeams, ...teams] : teams;

        // Resolve locations for teams with zip
        const uniqueZips = [...new Set(renderedTeams
          .filter((team) => !getStoredLocationLabel(team))
          .map((team) => team.zip)
          .filter(Boolean))];
        const zipToLocation = {};
        await Promise.all(uniqueZips.map(async (zip) => {
          zipToLocation[zip] = await resolveZip(zip);
        }));

        // Group teams by location label
        const grouped = {};
        renderedTeams.forEach(team => {
          const loc = getTeamLocationLabel(team, zipToLocation) || 'Other';
          if (!grouped[loc]) grouped[loc] = [];
          grouped[loc].push(team);
        });

        const locationKeys = Object.keys(grouped).sort((a, b) => {
          if (a === 'Other') return 1;
          if (b === 'Other') return -1;
          return a.localeCompare(b);
        });

        const card = (team) => {
          const teamName = String(team.name || 'Unnamed Team');
          const escapedTeamName = escapeHtml(teamName);
          const escapedTeamId = escapeHtml(team.id);
          const safePhotoUrl = getSafeImageUrl(team.photoUrl);
          const initial = escapeHtml(teamName.trim().charAt(0) || '?');
          const sport = escapeHtml(team.sport || 'Sport not set');
          const description = escapeHtml(team.description || 'No description available');
          const location = getTeamLocationLabel(team, zipToLocation);
          const escapedLocation = escapeHtml(location);

          return `
          <div class="team-card group bg-white rounded-xl shadow-md hover:shadow-xl transition duration-300 overflow-hidden cursor-pointer border border-gray-200 hover:border-primary-300" data-team-id="${escapedTeamId}">
            <div class="p-6">
              <div class="flex items-center space-x-4 mb-4">
                ${safePhotoUrl
            ? `<img src="${safePhotoUrl}" alt="${escapedTeamName}" class="w-16 h-16 rounded-full object-cover border-2 border-gray-200 group-hover:border-primary-400 transition">`
            : `<div class="w-16 h-16 rounded-full bg-gradient-to-br from-primary-100 to-primary-200 flex items-center justify-center border-2 border-gray-200 group-hover:border-primary-400 transition">
                      <span class="text-2xl font-bold text-primary-600">${initial}</span>
                    </div>`
          }
                <div class="flex-grow">
                  <h3 class="text-xl font-bold text-gray-900 group-hover:text-primary-600 transition mb-1">${escapedTeamName}</h3>
                  <div class="flex items-center gap-2">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-primary-100 text-primary-800">
                      ${sport}
                    </span>
                  </div>
                </div>
              </div>
              <p class="text-gray-600 text-sm line-clamp-2 mb-3">${description}</p>
              ${location
            ? `<div class="flex items-center text-xs text-gray-500">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    <a class="hover:text-primary-600 transition" target="_blank" rel="noopener noreferrer" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}">${escapedLocation}</a>
                  </div>`
            : ''
          }
            </div>
          </div>
        `;
        };

        const markup = locationKeys.map(loc => {
          const teamsForLoc = grouped[loc].sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
          return `
            <section class="space-y-4">
              <div class="flex items-center justify-between px-2">
                <div class="flex items-center gap-3">
                  <div class="h-1 w-12 bg-gradient-to-r from-primary-500 to-primary-700 rounded-full"></div>
                  <h2 class="text-2xl md:text-3xl font-bold text-gray-900">${loc === 'Other' ? 'Location Unavailable' : escapeHtml(loc)}</h2>
                </div>
                <span class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full font-medium">
                  ${teamsForLoc.length} team${teamsForLoc.length === 1 ? '' : 's'}
                </span>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                ${teamsForLoc.map(card).join('')}
              </div>
            </section>
          `;
        }).join('');

        container.innerHTML = markup;

        renderLoadMoreButton(container, {
          canLoadMore: !locationFilter && Boolean(browseCursor),
          onClick: async () => {
            const nextCursor = browseCursor;
            if (!nextCursor) return;
            await loadTeams('', { cursor: nextCursor, append: true });
          }
        });

        // Attach card navigation
        container.querySelectorAll('.team-card').forEach(cardEl => {
          cardEl.addEventListener('click', (event) => {
            const interactiveTarget = event.target.closest('a, button, input, select, textarea, summary, [role="button"], [role="link"]');
            if (interactiveTarget) {
              return;
            }

            const id = cardEl.dataset.teamId;
            window.location.href = `team.html#teamId=${id}`;
          });
        });
      } catch (error) {
        console.error("Error loading teams:", error);
        container.innerHTML = `
          <div class="col-span-full text-center py-16 bg-white rounded-2xl shadow-md border border-red-200">
            <svg class="w-16 h-16 text-red-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <p class="text-red-600 text-lg">Error loading teams. Please try again later.</p>
          </div>
        `;
      } finally {
        setSearchPending(false);
      }
    }

    searchForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      browseCursor = null;
      renderedTeams = [];
      await loadTeams(getLocationSearchValue());
    });

    clearSearchButton.addEventListener('click', async () => {
      locationSearchInput.value = '';
      browseCursor = null;
      renderedTeams = [];
      await loadTeams();
      locationSearchInput.focus();
    });

    loadTeams();
  </script>
</body>

</html>
