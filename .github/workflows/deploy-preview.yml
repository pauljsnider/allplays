name: deploy-preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  unit-tests:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --no-tags --prune --depth=1 origin +refs/pull/${{ github.event.pull_request.number }}/merge:refs/remotes/pull/${{ github.event.pull_request.number }}/merge
          git checkout --force refs/remotes/pull/${{ github.event.pull_request.number }}/merge

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 60000
          for attempt in 1 2 3; do
            npm ci --prefix apps/app && exit 0
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Transient npm install failure for apps/app. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Run unit tests
        run: npm run test:unit:ci

  regression-guards:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --no-tags --prune --depth=1 origin +refs/pull/${{ github.event.pull_request.number }}/merge:refs/remotes/pull/${{ github.event.pull_request.number }}/merge
          git checkout --force refs/remotes/pull/${{ github.event.pull_request.number }}/merge

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Firebase rules and deploy gates
        run: npm run ci:firebase-rules

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Start local static server
        run: python3 -m http.server 4173 >/tmp/allplays-preview-regression-guards.log 2>&1 &

      - name: Run roster/chat/media/replay regression smoke
        run: npm run test:smoke:team-fallback
        env:
          SMOKE_BASE_URL: http://127.0.0.1:4173

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: preview-regression-guards-http-log
          path: /tmp/allplays-preview-regression-guards.log

  deploy:
    if: github.event.pull_request.head.repo.full_name == github.repository
    needs: [unit-tests, regression-guards]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --no-tags --prune --depth=1 origin +refs/pull/${{ github.event.pull_request.number }}/merge:refs/remotes/pull/${{ github.event.pull_request.number }}/merge
          git checkout --force refs/remotes/pull/${{ github.event.pull_request.number }}/merge

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 60000
          for attempt in 1 2 3; do
            npm ci --prefix apps/app && exit 0
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Transient npm install failure for apps/app. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Build React app
        run: npm run app:build

      - name: Stage Firebase preview bundle
        run: |
          site_dir="$RUNNER_TEMP/firebase-preview-site"
          config_file="$GITHUB_WORKSPACE/.firebase-preview.generated.json"
          node scripts/stage-pages-bundle.mjs "$site_dir"
          node scripts/write-firebase-hosting-config.mjs "$site_dir" "$config_file"
          echo "FIREBASE_PREVIEW_CONFIG=$config_file" >> "$GITHUB_ENV"

      - name: Configure Firebase service account
        run: |
          credentials_file="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GAME_FLOW_C6311 }}' > "$credentials_file"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$credentials_file" >> "$GITHUB_ENV"

      - name: Prune stale Firebase preview channels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_CHANNEL: pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if ! open_channels="$(gh pr list --repo "${{ github.repository }}" --state open --limit 200 --json number --jq '.[].number' | sed 's/^/pr-/')"; then
            echo "Warning: unable to list open PRs; skipping stale Firebase preview channel pruning."
            exit 0
          fi
          channels_file="$RUNNER_TEMP/firebase-preview-channels.txt"
          prune_file="$RUNNER_TEMP/firebase-preview-prune.txt"
          npx firebase-tools@14.25.0 hosting:channel:list --site game-flow-c6311 --project game-flow-c6311 > "$channels_file"
          awk -F '│' 'NF > 2 {gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2); if ($2 ~ /^pr-/) print $2 }' "$channels_file" | sort -u > "$prune_file"
          while read -r channel; do
            if [ -z "$channel" ] || [ "$channel" = "$CURRENT_CHANNEL" ]; then
              continue
            fi
            if printf '%s\n' "$open_channels" | grep -qx "$channel"; then
              continue
            fi
            delete_log="$RUNNER_TEMP/firebase-preview-delete-$channel.log"
            if ! npx firebase-tools@14.25.0 hosting:channel:delete "$channel" --site game-flow-c6311 --project game-flow-c6311 --force >"$delete_log" 2>&1; then
              if grep -Eq 'HTTP Error: 404|Not Found' "$delete_log"; then
                echo "Skipping already-missing Firebase preview channel: $channel"
                continue
              fi
              cat "$delete_log" >&2
              exit 1
            fi
          done < "$prune_file"

      - name: Deploy Firebase Hosting preview
        id: deploy_preview
        run: |
          set -euo pipefail
          log_file="$RUNNER_TEMP/firebase-preview-deploy.log"
          if ! npx firebase-tools@14.25.0 hosting:channel:deploy pr-${{ github.event.pull_request.number }} --project game-flow-c6311 --config "$FIREBASE_PREVIEW_CONFIG" --expires 7d --non-interactive >"$log_file" 2>&1; then
            cat "$log_file"
            if grep -Eiq 'HTTP Error: 429|channel quota reached' "$log_file"; then
              {
                echo "### Firebase preview skipped"
                echo
                echo "Firebase Hosting preview channel quota was reached. Build and regression checks completed successfully, so this deploy-only preview limitation did not fail the PR."
              } >> "$GITHUB_STEP_SUMMARY"
              echo "preview_url=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            exit 1
          fi
          cat "$log_file"
          preview_url="$(grep -Eo 'https://[^ ]+' "$log_file" | tail -n1)"
          if [ -z "$preview_url" ]; then
            echo "Failed to extract preview URL from Firebase deploy output." >&2
            exit 1
          fi
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Report preview URL on pull request
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_URL: ${{ steps.deploy_preview.outputs.preview_url }}
          JQ_FILTER: '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("<!-- allplays-preview-url -->")) | .id'
        run: |
          set -euo pipefail
          marker='<!-- allplays-preview-url -->'
          if [ -n "$PREVIEW_URL" ]; then
            body="$(printf '%s\n\nPreview URL: %s' "$marker" "$PREVIEW_URL")"
          else
            body="$(printf '%s\n\nFirebase preview skipped: Firebase Hosting preview channel quota was reached for this run.' "$marker")"
          fi
          comment_id="$(gh api --paginate repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --jq "$JQ_FILTER" | head -n1)"
          if [ -n "$comment_id" ]; then
            gh api repos/${{ github.repository }}/issues/comments/"$comment_id" --method PATCH -f body="$body" >/dev/null
          else
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --method POST -f body="$body" >/dev/null
          fi
