name: preview-smoke

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

concurrency:
  # Unrelated label churn must neither cancel a landing smoke nor publish a
  # replacement required context. external-claim transitions intentionally use
  # the normal PR group so activating the lease cancels expensive work.
  group: ${{ (github.event.action == 'labeled' || github.event.action == 'unlabeled') && github.event.label.name != 'external-claim' && format('preview-smoke-label-noop-{0}', github.run_id) || format('preview-smoke-{0}', github.event.pull_request.number) }}
  cancel-in-progress: true

jobs:
  changes:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      landing: ${{ steps.filter.outputs.landing }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect preview-relevant changes
        id: filter
        env:
          ACTION: ${{ github.event.action }}
          EXTERNAL_CLAIMED: ${{ contains(github.event.pull_request.labels.*.name, 'external-claim') }}
          LABEL_NAME: ${{ github.event.label.name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # external-claim is the active-development lease. Its removal is the
          # handoff to the serialized landing worker and reruns the full smoke.
          if [ "$EXTERNAL_CLAIMED" = "true" ]; then
            echo "external-claim is active — deferring full preview smoke." >&2
            echo "landing=false" >> "$GITHUB_OUTPUT"
            echo "web=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if { [ "$ACTION" = "labeled" ] || [ "$ACTION" = "unlabeled" ]; } &&
             [ "$LABEL_NAME" != "external-claim" ]; then
            echo "Unrelated label transition — not restarting preview smoke." >&2
            echo "landing=false" >> "$GITHUB_OUTPUT"
            echo "web=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "landing=true" >> "$GITHUB_OUTPUT"

          # Fail open: if we cannot compute a diff (new branch, missing base),
          # run the smoke so we never silently skip a real regression.
          if [ -z "$BASE_SHA" ] || ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "Base sha unavailable — running preview-smoke." >&2
            echo "web=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BASE_SHA...$HEAD_SHA")
          echo "Changed files:" >&2
          echo "$CHANGED" >&2

          # Paths that cannot affect the served static site or the /app/ bundle the
          # smoke exercises: backend functions, security rules, native shells, docs,
          # migrations, and unit tests. preview-smoke only needs to run when the diff
          # touches something OUTSIDE this set. Anything unrecognized, including
          # workflow changes under .github/workflows/, runs the smoke.
          SKIPPABLE='^(functions/|ios/|android/|docs/|_migration/|tests/unit/)|^firestore\.(rules|indexes\.json)$|^storage\.rules$|^[A-Za-z0-9_.-]+\.md$'

          if echo "$CHANGED" | grep -Ev "$SKIPPABLE" | grep -q .; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "Only backend/native/docs paths changed — skipping preview-smoke." >&2
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi

  preview-smoke-run:
    needs: changes
    if: github.event.pull_request.head.repo.full_name == github.repository && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 60000
          for attempt in 1 2 3; do
            npm ci --prefix apps/app && exit 0
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Transient npm install failure for apps/app. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Build React app
        run: npm run app:build

      - name: Stage exact GitHub Pages artifact
        env:
          ALLPLAYS_APP_CHECK_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ vars.APP_CHECK_RECAPTCHA_ENTERPRISE_SITE_KEY }}
          ALLPLAYS_APP_CHECK_ENFORCEMENT_READY: ${{ vars.APP_CHECK_ENFORCEMENT_READY }}
        run: node scripts/stage-pages-bundle.mjs "$RUNNER_TEMP/allplays-pages"

      - name: Start staged Pages artifact server
        run: python3 -m http.server 4173 --directory "$RUNNER_TEMP/allplays-pages" >/tmp/allplays-preview-smoke.log 2>&1 &

      - name: Start React app dev server
        run: npm --prefix apps/app run dev -- --host 127.0.0.1 --port 5174 >/tmp/allplays-app-preview-smoke.log 2>&1 &

      - name: Wait for local smoke servers
        run: |
          set -euo pipefail
          for url in http://127.0.0.1:4173 http://127.0.0.1:5174; do
            for attempt in {1..60}; do
              if curl --fail --silent --show-error --max-time 2 "$url" >/dev/null; then
                echo "$url is ready"
                break
              fi
              if [ "$attempt" -eq 60 ]; then
                echo "Timed out waiting for $url" >&2
                echo "Static server log:" >&2
                cat /tmp/allplays-preview-smoke.log >&2 || true
                echo "App server log:" >&2
                cat /tmp/allplays-app-preview-smoke.log >&2 || true
                exit 1
              fi
              sleep 1
            done
          done

      - name: Resolve Playwright version
        id: pw-version
        run: |
          set -euo pipefail
          # Key the browser cache on the installed Playwright version so a version
          # bump misses the cache and re-downloads, but same-version runs reuse it.
          version="$(node -e "console.log(require('@playwright/test/package.json').version)" 2>/dev/null \
            || node -e "console.log(require('playwright/package.json').version)")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            # Browser binaries restored from cache; only (re)install the OS libs,
            # which are not cached and are cheap.
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Run static-hosting smoke
        run: npx playwright test --config=playwright.smoke.config.js --grep-invert @visual --reporter=line
        env:
          SMOKE_BASE_URL: http://127.0.0.1:4173
          SMOKE_APP_BASE_URL: http://127.0.0.1:5174
          SMOKE_APP_BOOT_URL: http://127.0.0.1:4173/app/
          SMOKE_EXPECTED_APP_CHECK_SITE_KEY: ${{ vars.APP_CHECK_RECAPTCHA_ENTERPRISE_SITE_KEY }}
          SMOKE_PAGES_STAGED_ARTIFACT: 'true'
          SMOKE_PARENT_EMAIL: ${{ vars.SMOKE_PARENT_EMAIL }}
          SMOKE_PARENT_PASSWORD: ${{ secrets.SMOKE_PARENT_PASSWORD }}
          SMOKE_SUITE: preview
          SMOKE_TEAM_ID: ${{ vars.SMOKE_TEAM_ID }}
          SMOKE_GAME_ID: ${{ vars.SMOKE_GAME_ID }}
          SMOKE_PLAYER_ID: ${{ vars.SMOKE_PLAYER_ID }}

      - name: Run deterministic visual regression
        run: npm run test:smoke:visual -- --reporter=line
        env:
          SMOKE_BASE_URL: http://127.0.0.1:4173
          SMOKE_APP_BASE_URL: http://127.0.0.1:5174
          SMOKE_SUITE: preview

      - name: Upload visual regression diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: preview-visual-regression-diffs
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: preview-smoke-http-log
          path: |
            /tmp/allplays-preview-smoke.log
            /tmp/allplays-app-preview-smoke.log

  # Required-check aggregate: always runs and reports the branch-protection status
  # named "preview-smoke". Passes when the heavy job succeeded OR was skipped as
  # not-applicable to this change (backend/native/docs-only); fails only on a real
  # failure. Mirrors the mobile-build aggregate so a skipped run never blocks merge.
  preview-smoke:
    name: ${{ (github.event.action == 'labeled' || github.event.action == 'unlabeled') && github.event.label.name != 'external-claim' && 'preview-smoke-label-noop' || 'preview-smoke' }}
    needs: [changes, preview-smoke-run]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report preview-smoke result
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          IS_SAME_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          RUN_RESULT: ${{ needs.preview-smoke-run.result }}
          SHOULD_RUN: ${{ needs.changes.outputs.web }}
        run: |
          set -euo pipefail
          echo "changes result: $CHANGES_RESULT"
          echo "preview-smoke-run result: $RUN_RESULT"

          if [ "$IS_SAME_REPOSITORY" != "true" ]; then
            echo "Fork PR — preview-smoke is not eligible to run."
            exit 0
          fi

          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "Change detection did not succeed ($CHANGES_RESULT) — failing closed." >&2
            exit 1
          fi

          if [ "${{ needs.changes.outputs.landing }}" != "true" ]; then
            echo "Development ownership is still active — full preview smoke deferred until external-claim is removed."
            exit 0
          fi

          if [ "$SHOULD_RUN" = "false" ] && [ "$RUN_RESULT" = "skipped" ]; then
            echo "No preview-relevant changes — preview-smoke is not required."
            exit 0
          fi

          if [ "$SHOULD_RUN" = "true" ] && [ "$RUN_RESULT" = "success" ]; then
            echo "preview-smoke succeeded."
            exit 0
          fi

          echo "preview-smoke result was inconsistent with change detection (web=$SHOULD_RUN, result=$RUN_RESULT)." >&2
          exit 1
