name: ci

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cache-bust-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Validate critical cache-bust updates
        run: node scripts/check-critical-cache-bust.mjs
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 60000
          for attempt in 1 2 3; do
            npm ci --prefix apps/app && exit 0
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Transient npm install failure for apps/app. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Validate app performance evidence when present
        run: |
          if [ -f docs/app-performance-measurements.json ]; then
            npm run app:validate-performance-measurements -- docs/app-performance-measurements.json
          else
            echo "No app performance measurement artifact to validate."
          fi

      - name: Run unit tests
        run: npm run test:unit:ci

      - name: Run notification functions coverage
        run: npm run test:functions:notifications

      - name: Run authentication email functions coverage
        run: npm run test:functions:auth-email

      - name: Run team email functions coverage
        run: npm run test:functions:team-email

  app-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install app dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 60000
          for attempt in 1 2 3; do
            npm ci --prefix apps/app && exit 0
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Transient npm install failure for apps/app. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Audit app dependencies
        run: npm --prefix apps/app audit --audit-level=moderate

      - name: Typecheck app
        run: npm --prefix apps/app run typecheck

      - name: Lint app
        run: node scripts/lint-app-ci.mjs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}

      - name: Test app
        run: npm --prefix apps/app run test:ci
