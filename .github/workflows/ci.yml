name: ci

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cache-bust-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Validate critical cache-bust updates
        run: node scripts/check-critical-cache-bust.mjs
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}

  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Scan app and legacy web code for private secrets
        run: npm run ci:secret-scan

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 60000
          for attempt in 1 2 3; do
            npm ci --prefix apps/app && exit 0
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Transient npm install failure for apps/app. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Run unit tests
        run: npm run test:unit:ci

      - name: Run notification functions coverage
        run: npm run test:functions:notifications

  app-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install app dependencies
        run: npm ci --prefix apps/app

      - name: Typecheck app
        run: npm --prefix apps/app run typecheck

      - name: Lint app
        run: npm --prefix apps/app run lint -- --quiet
