name: deploy-prod

on:
  push:
    branches:
      - master

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Install app dependencies
        run: npm ci --prefix apps/app

      - name: Run unit tests
        run: npm run test:unit:ci

      - name: Run authentication email functions coverage
        run: npm run test:functions:auth-email

  regression-guards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Firebase rules and deploy gates
        run: npm run ci:firebase-rules

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start local static server
        run: python3 -m http.server 4173 >/tmp/allplays-prod-regression-guards.log 2>&1 &

      - name: Run roster/chat/media/replay regression smoke
        run: npm run test:smoke:team-fallback
        env:
          SMOKE_BASE_URL: http://127.0.0.1:4173

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: prod-regression-guards-http-log
          path: /tmp/allplays-prod-regression-guards.log

  deploy:
    needs: [unit-tests, regression-guards]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      actions: read
      checks: write
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci --prefix apps/app

      - name: Build React app
        run: npm run app:build

      - name: Stage Firebase production bundle
        env:
          ALLPLAYS_APP_CHECK_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ vars.APP_CHECK_RECAPTCHA_ENTERPRISE_SITE_KEY }}
          ALLPLAYS_APP_CHECK_ENFORCEMENT_READY: ${{ vars.APP_CHECK_ENFORCEMENT_READY }}
        run: |
          site_dir="$RUNNER_TEMP/firebase-prod-site"
          config_file="$GITHUB_WORKSPACE/.firebase-prod.generated.json"
          node scripts/stage-pages-bundle.mjs "$site_dir"
          node scripts/write-firebase-hosting-config.mjs "$site_dir" "$config_file"
          echo "FIREBASE_PROD_CONFIG=$config_file" >> "$GITHUB_ENV"

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Detect Storage rules changes
        id: storage_rules
        shell: bash
        run: |
          if git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- storage.rules; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Firestore configuration changes
        id: firestore_config
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          last_success_sha=""
          lookup_succeeded="false"
          lookup_max_attempts=3
          for ((lookup_attempt = 1; lookup_attempt <= lookup_max_attempts; lookup_attempt += 1)); do
            if last_success_sha="$(gh api --method GET "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-prod.yml/runs" \
              -f branch="$GITHUB_REF_NAME" \
              -f status=success \
              -F per_page=1 \
              --jq '.workflow_runs[0].head_sha // ""')"; then
              lookup_succeeded="true"
              break
            fi

            if (( lookup_attempt < lookup_max_attempts )); then
              sleep $((5 * lookup_attempt))
            fi
          done

          if [[ "$lookup_succeeded" != "true" ]]; then
            echo "::warning::The successful production deploy lookup failed; forcing Firestore-first ordering."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! "$last_success_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::warning::No valid successful production deploy baseline was found; forcing Firestore-first ordering."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif ! git cat-file -e "${last_success_sha}^{commit}" 2>/dev/null; then
            echo "::warning::The last successful production deploy commit is unavailable locally; forcing Firestore-first ordering."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$last_success_sha" "$GITHUB_SHA" -- firestore.rules firestore.indexes.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Resolve/download the exact CLI before requesting the five-minute GitHub
      # OIDC credential. Credentialed steps below are each bounded to four minutes.
      - name: Prime exact Firebase deploy CLI
        run: npx firebase-tools@14.25.0 --version

      - name: Authenticate Storage deploy through exact-workflow OIDC
        id: google_auth_storage
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.FIREBASE_DEPLOY_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.FIREBASE_DEPLOY_SERVICE_ACCOUNT }}
          project_id: game-flow-c6311
          create_credentials_file: true
          cleanup_credentials: true

      - name: Deploy Firebase Storage rules when available
        timeout-minutes: 4
        shell: bash
        env:
          STORAGE_RULES_CHANGED: ${{ steps.storage_rules.outputs.changed }}
        run: |
          set -euo pipefail
          storage_log="$RUNNER_TEMP/firebase-storage-deploy.log"
          set +e
          npx firebase-tools@14.25.0 deploy --only storage --project game-flow-c6311 --config "$FIREBASE_PROD_CONFIG" --non-interactive 2>&1 | tee "$storage_log"
          storage_status="${PIPESTATUS[0]}"
          set -e

          if (( storage_status == 0 )); then
            exit 0
          fi

          storage_plain_log="$RUNNER_TEMP/firebase-storage-deploy.plain.log"
          sed -E 's/\x1B\[[0-9;]*[[:alpha:]]//g' "$storage_log" > "$storage_plain_log"
          storage_not_configured="Firebase Storage has not been set up on project 'game-flow-c6311'"
          if grep -Fq "$storage_not_configured" "$storage_plain_log" && [[ "$STORAGE_RULES_CHANGED" != "true" ]]; then
            echo "::warning::Firebase Storage is not initialized; no Storage surface exists yet. Rules were unchanged, so the rest of production deployment can continue."
            echo "### Firebase Storage rules" >> "$GITHUB_STEP_SUMMARY"
            echo "Skipped because Storage is not initialized and storage.rules was unchanged." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if grep -Fq "$storage_not_configured" "$storage_plain_log"; then
            echo "::error::storage.rules changed, but Firebase Storage is not initialized. Refusing to deploy other production changes with stale Storage authorization rules."
          fi
          exit "$storage_status"

      - name: Remove Storage deploy credential
        if: always()
        env:
          GOOGLE_CREDENTIAL_FILE: ${{ steps.google_auth_storage.outputs.credentials_file_path }}
        run: |
          set -euo pipefail
          if [[ -n "$GOOGLE_CREDENTIAL_FILE" ]]; then
            rm -f -- "$GOOGLE_CREDENTIAL_FILE"
          fi
          {
            echo "CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE="
            echo "GOOGLE_APPLICATION_CREDENTIALS="
            echo "GOOGLE_GHA_CREDS_PATH="
          } >> "$GITHUB_ENV"

      - name: Authenticate production deploy through exact-workflow OIDC
        id: google_auth_production
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.FIREBASE_DEPLOY_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.FIREBASE_DEPLOY_SERVICE_ACCOUNT }}
          project_id: game-flow-c6311
          create_credentials_file: true
          cleanup_credentials: true

      - name: Deploy Firebase production
        timeout-minutes: 4
        shell: bash
        env:
          FIRESTORE_CONFIG_CHANGED: ${{ steps.firestore_config.outputs.changed }}
        run: |
          set -euo pipefail
          transient_pattern='(^|[^[:alnum:]])(429|500|502|503|504)([^[:alnum:]]|$)|HTTP Error:[[:space:]]*409,[[:space:]]*Requested entity already exists|service[[:space:]_-]+unavailable|econnreset|connection[[:space:]_-]+reset|network[[:space:]_-]+reset|etimedout|timed[[:space:]_-]+out|timeout'

          retry_firebase_deploy() {
            local deploy_targets="$1"
            local deploy_label="$2"
            local max_attempts=3
            local attempt deploy_log deploy_status retry_delay_seconds

            for ((attempt = 1; attempt <= max_attempts; attempt += 1)); do
              deploy_log="$RUNNER_TEMP/firebase-${deploy_label}-deploy-attempt-${attempt}.log"
              set +e
              npx firebase-tools@14.25.0 deploy --only "$deploy_targets" --project game-flow-c6311 --config "$FIREBASE_PROD_CONFIG" --non-interactive 2>&1 | tee "$deploy_log"
              deploy_status="${PIPESTATUS[0]}"
              set -e

              if (( deploy_status == 0 )); then
                return 0
              fi

              if ! grep -Eiq "$transient_pattern" "$deploy_log"; then
                echo "Firebase ${deploy_label} deploy failed with a non-transient error; not retrying." >&2
                return "$deploy_status"
              fi

              if (( attempt == max_attempts )); then
                echo "Firebase ${deploy_label} deploy failed after ${max_attempts} transient attempts." >&2
                return "$deploy_status"
              fi

              retry_delay_seconds=$((15 * (2 ** (attempt - 1))))
              echo "Transient Firebase ${deploy_label} deploy failure; retrying in ${retry_delay_seconds} seconds (attempt $((attempt + 1))/${max_attempts})." >&2
              sleep "$retry_delay_seconds"
            done
          }

          if [[ "$FIRESTORE_CONFIG_CHANGED" == "true" ]]; then
            # Keep coupled authorization/index changes fail-closed: application code
            # must not publish until its Firestore configuration is active.
            retry_firebase_deploy "firestore:rules,firestore:indexes" "firestore"
            retry_firebase_deploy "hosting,functions" "application"
          else
            # No authorization/index drift exists relative to the last successful
            # production deployment. Do not make a redundant Rules API write: an
            # unrelated Rules API outage must not fail a Hosting/Functions-only fix.
            retry_firebase_deploy "hosting,functions" "application"
          fi

      - name: Remove production deploy credential
        if: always()
        env:
          GOOGLE_CREDENTIAL_FILE: ${{ steps.google_auth_production.outputs.credentials_file_path }}
        run: |
          set -euo pipefail
          if [[ -n "$GOOGLE_CREDENTIAL_FILE" ]]; then
            rm -f -- "$GOOGLE_CREDENTIAL_FILE"
          fi
