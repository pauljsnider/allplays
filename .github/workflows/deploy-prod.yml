name: deploy-prod

on:
  push:
    branches:
      - master

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci --prefix apps/app

      - name: Run unit tests
        run: npm run test:unit:ci

      - name: Run authentication email functions coverage
        run: npm run test:functions:auth-email

  regression-guards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Firebase rules and deploy gates
        run: npm run ci:firebase-rules

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start local static server
        run: python3 -m http.server 4173 >/tmp/allplays-prod-regression-guards.log 2>&1 &

      - name: Run roster/chat/media/replay regression smoke
        run: npm run test:smoke:team-fallback
        env:
          SMOKE_BASE_URL: http://127.0.0.1:4173

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-regression-guards-http-log
          path: /tmp/allplays-prod-regression-guards.log

  deploy:
    needs: [unit-tests, regression-guards]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci --prefix apps/app

      - name: Build React app
        run: npm run app:build

      - name: Stage Firebase production bundle
        run: |
          site_dir="$RUNNER_TEMP/firebase-prod-site"
          config_file="$GITHUB_WORKSPACE/.firebase-prod.generated.json"
          node scripts/stage-pages-bundle.mjs "$site_dir"
          node scripts/write-firebase-hosting-config.mjs "$site_dir" "$config_file"
          echo "FIREBASE_PROD_CONFIG=$config_file" >> "$GITHUB_ENV"

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Configure Firebase service account
        run: |
          credentials_file="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GAME_FLOW_C6311 }}' > "$credentials_file"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$credentials_file" >> "$GITHUB_ENV"

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Check password-reset retry policy
        id: password-reset-retry-policy
        run: |
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          retry_policy="$(gcloud functions describe processPasswordResetEmailRequest --region us-central1 --project game-flow-c6311 --format='value(eventTrigger.failurePolicy.retry)')"
          if [ "$retry_policy" = "True" ] || [ "$retry_policy" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable password-reset retry policy
        if: steps.password-reset-retry-policy.outputs.enabled != 'true'
        run: npx firebase-tools@14.25.0 deploy --only functions:processPasswordResetEmailRequest --project game-flow-c6311 --config "$FIREBASE_PROD_CONFIG" --non-interactive --force

      - name: Deploy Firebase production
        run: npx firebase-tools@14.25.0 deploy --only hosting,firestore:rules,firestore:indexes,functions --project game-flow-c6311 --config "$FIREBASE_PROD_CONFIG" --non-interactive
