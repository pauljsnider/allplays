name: deploy-prod

on:
  push:
    branches:
      - master

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Install app dependencies
        run: npm ci --prefix apps/app

      - name: Run unit tests
        run: npm run test:unit:ci

      - name: Run authentication email functions coverage
        run: npm run test:functions:auth-email

  regression-guards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Firebase rules and deploy gates
        run: npm run ci:firebase-rules

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start local static server
        run: python3 -m http.server 4173 >/tmp/allplays-prod-regression-guards.log 2>&1 &

      - name: Run roster/chat/media/replay regression smoke
        run: npm run test:smoke:team-fallback
        env:
          SMOKE_BASE_URL: http://127.0.0.1:4173

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-regression-guards-http-log
          path: /tmp/allplays-prod-regression-guards.log

  deploy:
    needs: [unit-tests, regression-guards]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm ci --prefix apps/app

      - name: Build React app
        run: npm run app:build

      - name: Stage Firebase production bundle
        run: |
          site_dir="$RUNNER_TEMP/firebase-prod-site"
          config_file="$GITHUB_WORKSPACE/.firebase-prod.generated.json"
          node scripts/stage-pages-bundle.mjs "$site_dir"
          node scripts/write-firebase-hosting-config.mjs "$site_dir" "$config_file"
          echo "FIREBASE_PROD_CONFIG=$config_file" >> "$GITHUB_ENV"

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Configure Firebase service account
        run: |
          credentials_file="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GAME_FLOW_C6311 }}' > "$credentials_file"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$credentials_file" >> "$GITHUB_ENV"

      - name: Deploy Firebase production
        shell: bash
        run: |
          set -euo pipefail
          max_attempts=3
          transient_pattern='(^|[^[:alnum:]])(429|500|502|503|504)([^[:alnum:]]|$)|service[[:space:]_-]+unavailable|econnreset|connection[[:space:]_-]+reset|network[[:space:]_-]+reset|etimedout|timed[[:space:]_-]+out|timeout'

          for ((attempt = 1; attempt <= max_attempts; attempt += 1)); do
            deploy_log="$RUNNER_TEMP/firebase-prod-deploy-attempt-${attempt}.log"
            set +e
            npx firebase-tools@14.25.0 deploy --only hosting,firestore:rules,firestore:indexes,storage,functions --project game-flow-c6311 --config "$FIREBASE_PROD_CONFIG" --non-interactive 2>&1 | tee "$deploy_log"
            deploy_status="${PIPESTATUS[0]}"
            set -e

            if (( deploy_status == 0 )); then
              exit 0
            fi

            if ! grep -Eiq "$transient_pattern" "$deploy_log"; then
              echo "Firebase production deploy failed with a non-transient error; not retrying." >&2
              exit "$deploy_status"
            fi

            if (( attempt == max_attempts )); then
              echo "Firebase production deploy failed after ${max_attempts} transient attempts." >&2
              exit "$deploy_status"
            fi

            retry_delay_seconds=$((15 * (2 ** (attempt - 1))))
            echo "Transient Firebase deploy failure; retrying in ${retry_delay_seconds} seconds (attempt $((attempt + 1))/${max_attempts})." >&2
            sleep "$retry_delay_seconds"
          done
