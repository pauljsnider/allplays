<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="img/logo_small.png">
    <title>Admin Status - ALL PLAYS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                50: '#eef2ff',
                100: '#e0e7ff',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81'
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background: radial-gradient(circle at 85% 0%, rgba(99,102,241,0.14) 0%, rgba(248,250,252,0) 42%),
          radial-gradient(circle at 8% 20%, rgba(67,56,202,0.10) 0%, rgba(248,250,252,0) 48%),
          #f8fafc;
        color: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
      }
      .container {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        padding: 2rem;
        text-align: center;
        max-width: 90%;
        width: 400px;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
        color: #1f2937;
      }
      #admin-status-display {
        font-size: 1.25rem;
        font-weight: 600;
        color: #4f46e5;
        margin-top: 1.5rem;
      }
      .error-message {
        color: #ef4444;
        font-weight: 500;
      }
      .loading-message {
        color: #6b7280;
      }
      .back-link {
        display: inline-block;
        margin-top: 1.5rem;
        color: #4338ca;
        text-decoration: none;
        font-weight: 600;
      }
      .back-link:hover {
        text-decoration: underline;
      }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Entitlement Status</h1>
        <p class="loading-message">Loading admin status...</p>
        <div id="admin-status-display"></div>
        <a href="admin.html" class="back-link">Go to Admin Dashboard</a><br>
        <a href="workflow-admin-ops.html" class="back-link">← Back to Admin Workflow</a>
    </div>

    <script type="module">
        import { checkAuth } from './js/auth.js?v=51';
        import { renderHeader, renderFooter } from './js/utils.js?v=15'; // Assuming utils.js is needed for consistency or future header/footer

        const adminStatusDisplay = document.getElementById('admin-status-display');

        function removeLoadingMessage() {
            const loadingMessage = adminStatusDisplay.previousElementSibling;
            if (loadingMessage?.classList?.contains('loading-message')) {
                loadingMessage.remove();
            }
        }

        checkAuth((user) => {
            if (user) {
                if (user.isAdmin) {
                    adminStatusDisplay.innerHTML = '<span class="text-green-600">isAdmin field is TRUE</span>';
                    removeLoadingMessage();
                } else {
                    adminStatusDisplay.innerHTML = '<span class="text-red-600">isAdmin: FALSE</span><p class="error-message">You do not have admin entitlement.</p>';
                    removeLoadingMessage();
                }
            } else {
                adminStatusDisplay.innerHTML = '<span class="text-red-600">Not logged in</span><p class="error-message">Please log in to check your admin status.</p>';
                removeLoadingMessage();
                // Optional: redirect to login page if not logged in
                // window.location.href = 'login.html';
            }
        });

        // Initialize header/footer if needed, though this page is simple.
        // renderHeader(document.getElementById('header-container'), null);
        // renderFooter(document.getElementById('footer-container'));
    </script>
</body>
</html>
