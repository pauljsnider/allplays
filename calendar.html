    <script type="module">
        import { getUserTeamsWithAccess, getParentTeams, getGames, getTeam, getTrackedCalendarEventUids, getUserProfile, submitRsvp, submitRsvpForPlayer, getMyRsvp, getRsvpSummaries, getRsvps } from './js/db.js?v=81';
        import { renderHeader, renderFooter, escapeHtml, formatDate, formatTime, fetchAndParseCalendar, expandRecurrence, buildGlobalCalendarIcsEvent, isTrackedCalendarEvent } from './js/utils.js?v=14';
        import { mergeGlobalCalendarIcsEvents } from './js/calendar-ics-sync.js?v=1';
        import { requireAuth, checkAuth } from './js/auth.js?v=41';
        import { buildLinkedPlayersByTeam, resolveCalendarRsvpSubmission } from './js/calendar-rsvp.js?v=1';
        import { applyRsvpHydration } from './js/rsvp-hydration.js?v=1';
        import { buildAvailabilityNoteRows, canViewAvailabilityNotes, formatAvailabilityCutoff, isAvailabilityLocked, normalizeAvailabilityPreferences } from './js/availability-preferences.js?v=1';
        import { getDefaultSchedulePrintOptions, printSchedule, promptSchedulePrintOptions } from './js/schedule-print.js?v=2';

        renderFooter(document.getElementById('footer-container'));

        let allEvents = [];
        let filteredEvents = [];
        let currentUser = null;
        let currentUserId = null;
        let currentView = 'detailed';
        let currentTimeRange = 'month';
        let currentTypeFilter = 'all';
        let currentTeamFilter = '';
        let calendarMonth = new Date().getMonth();
        let calendarYear = new Date().getFullYear();
        let activeDayDetail = null;
        let linkedPlayersByTeam = new Map();
        let calendarTeams = [];
        const rsvpHydrationCache = new Map();
        let renderedRsvpHydrationToken = 0;
        const teamColors = {};
        const colorPalette = ['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#ef4444', '#8b5cf6', '#06b6d4', '#f97316'];

        window.setView = setView;
        window.setTimeRange = setTimeRange;
        window.setTypeFilter = setTypeFilter;
        window.applyFilters = applyFilters;
        window.printCurrentSchedule = printCurrentSchedule;
        window.printCurrentScheduleOptions = printCurrentScheduleOptions;
        window.navMonth = navMonth;
        window.exportIcs = exportIcs;
        window.openSyncCalendarModal = openSyncCalendarModal;
        window.closeSyncCalendarModal = closeSyncCalendarModal;
        window.openDayDetail = openDayDetail;
        window.closeDayModal = closeDayModal;
        window.submitCalendarRsvp = submitCalendarRsvp;
        window.submitCalendarRsvpFromButton = submitCalendarRsvpFromButton;

        function escapeAttr(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function formatRsvpSummary(summary) {
            if (!summary) return 'No RSVPs yet.';
            return `${summary.going || 0} going · ${summary.maybe || 0} maybe · ${summary.notGoing || 0} can't go · ${summary.notResponded || 0} no response`;
        }

        function getLinkedPlayersForTeam(teamId) {
            return Array.isArray(linkedPlayersByTeam.get(teamId)) ? linkedPlayersByTeam.get(teamId) : [];
        }

        function getDbRsvpEvents(events) {
            const seen = new Set();
            return (events || []).filter((ev) => {
                if (ev?.source !== 'db') return false;
                if (ev.type !== 'game' && ev.type !== 'practice') return false;
                if (ev.status === 'cancelled') return false;
                const key = `${ev.teamId}::${ev.id}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        function getRsvpHydrationCacheEntry(teamId, gameId) {
            const key = `${teamId}::${gameId}`;
            let cached = rsvpHydrationCache.get(key);
            if (!cached) {
                cached = {};
                rsvpHydrationCache.set(key, cached);
            }
            return cached;
        }

        async function hydrateRsvpEvents(events, { includeNotes = false, includeMissingSummary = false } = {}) {
            const dbEvents = getDbRsvpEvents(events);
            if (dbEvents.length === 0) return;

            await Promise.all(dbEvents.map(async (eventForPrefs) => {
                const cached = getRsvpHydrationCacheEntry(eventForPrefs.teamId, eventForPrefs.id);
                if (!cached.myRsvp) {
                    const linkedPlayerIds = getLinkedPlayersForTeam(eventForPrefs.teamId).map((player) => player.playerId).filter(Boolean);
                    cached.myRsvp = getMyRsvp(eventForPrefs.teamId, eventForPrefs.id, currentUserId, linkedPlayerIds)
                        .then((myRsvp) => myRsvp ? myRsvp.response : null);
                }
                if (includeMissingSummary && !eventForPrefs.rsvpSummary && !cached.summary) {
                    cached.summary = getRsvpSummaries(eventForPrefs.teamId, [eventForPrefs.id])
                        .then((summaries) => summaries?.get(eventForPrefs.id) || null);
                }
                if (includeNotes && eventForPrefs.notesVisible && !cached.rsvps) {
                    cached.rsvps = getRsvps(eventForPrefs.teamId, eventForPrefs.id);
                }

                try {
                    const [myRsvp, summary, rsvps] = await Promise.all([
                        cached.myRsvp,
                        cached.summary || Promise.resolve(null),
                        includeNotes && eventForPrefs.notesVisible ? (cached.rsvps || Promise.resolve([])) : Promise.resolve([])
                    ]);
                    applyRsvpHydration(allEvents, eventForPrefs.teamId, eventForPrefs.id, {
                        myRsvp,
                        summary
                    });
                    if (includeNotes && eventForPrefs.notesVisible) {
                        const availabilityNotes = buildAvailabilityNoteRows(rsvps, eventForPrefs.availabilityPreferences, !!eventForPrefs.isTeamAdmin);
                        allEvents.forEach((ev) => {
                            if (ev.teamId === eventForPrefs.teamId && ev.id === eventForPrefs.id) {
                                ev.availabilityNotes = availabilityNotes;
                            }
                        });
                    }
                } catch (_) {
                    rsvpHydrationCache.delete(`${eventForPrefs.teamId}::${eventForPrefs.id}`);
                }
            }));
        }

        async function hydrateRenderedRsvpEvents() {
            if (currentView !== 'detailed' && currentView !== 'compact') return;
            const token = ++renderedRsvpHydrationToken;
            const view = currentView;
            await hydrateRsvpEvents(filteredEvents, { includeMissingSummary: true });
            if (token !== renderedRsvpHydrationToken || currentView !== view) return;
            if (view === 'detailed') renderDetailed();
            else renderCompact();
        }

        function renderCalendarChildScope(teamId) {
            const linkedPlayers = getLinkedPlayersForTeam(teamId);
            if (linkedPlayers.length === 0) return '';
            if (linkedPlayers.length === 1) {
                return `
                    <div class="mb-2 text-xs text-gray-500">
                        For ${escapeHtml(linkedPlayers[0].playerName || 'Player')}
                    </div>
                `;
            }

            return `
                <label class="block mb-2">
                    <span class="text-xs text-gray-500">Choose child</span>
                    <select data-rsvp-child-selector="true" class="mt-1 w-full rounded-lg border border-gray-200 bg-white px-2 py-1.5 text-xs text-gray-700 focus:outline-none focus:ring-1 focus:ring-primary-500">
                        <option value="">Select child</option>
                        ${linkedPlayers.map((player) => `
                            <option value="${escapeAttr(player.playerId)}">${escapeHtml(player.playerName || 'Player')}</option>
                        `).join('')}
                    </select>
                </label>
            `;
        }

        function renderAvailabilityNotes(ev) {
            const notes = Array.isArray(ev.availabilityNotes) ? ev.availabilityNotes : [];
            if (notes.length === 0) return '';
            return `
                <div class="mt-2 space-y-1">
                    ${notes.map((row) => `<div class="text-[11px] text-gray-500 italic"><span class="font-semibold not-italic">${escapeHtml(row.displayName)}:</span> ${escapeHtml(row.note)}</div>`).join('')}
                </div>
            `;
        }

        function renderRsvpBlock(ev, compact = false) {
            if ((ev.type !== 'game' && ev.type !== 'practice') || ev.status === 'cancelled') return '';
            const summary = formatRsvpSummary(ev.rsvpSummary);
            const locked = !!ev.availabilityLocked;
            const lockCopy = locked ? `Availability locked ${formatAvailabilityCutoff(ev.availabilityPreferences).toLowerCase()}.` : '';
            if (ev.source !== 'db') {
                return compact
                    ? `<span class="text-[10px] text-gray-400">Availability after tracking</span>`
                    : `<div class="mt-1 text-xs text-gray-400">Availability opens after this event is tracked in the schedule.</div><div class="mt-1 text-xs text-gray-400">${summary}</div>`;
            }
            if (compact) {
                return `<span class="text-[10px] ${locked ? 'text-amber-600 font-semibold' : 'text-gray-500'}">${locked ? 'Locked' : summary}</span>`;
            }
            const linkedPlayers = getLinkedPlayersForTeam(ev.teamId);
            const defaultChildId = linkedPlayers.length === 1 ? linkedPlayers[0].playerId : '';
            return `
                <div class="mt-3 border-t border-gray-100 pt-3" data-rsvp-container>
                    <div class="text-[11px] font-bold uppercase tracking-wide text-gray-500 mb-2">Availability</div>
                    ${renderCalendarChildScope(ev.teamId)}
                    <div class="flex gap-2">
                        <button ${locked ? 'disabled aria-disabled="true"' : ''} data-team-id="${escapeAttr(ev.teamId)}" data-game-id="${escapeAttr(ev.id)}" data-rsvp-child-id="${escapeAttr(defaultChildId)}" onclick="submitCalendarRsvpFromButton(this, 'going')" class="rsvp-btn rsvp-going flex-1 px-2 py-1.5 text-xs font-semibold rounded-lg border transition ${locked ? 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed' : (ev.myRsvp === 'going' ? 'bg-green-600 text-white border-green-600' : 'bg-white text-green-700 border-green-300 hover:bg-green-50')}">Going</button>
                        <button ${locked ? 'disabled aria-disabled="true"' : ''} data-team-id="${escapeAttr(ev.teamId)}" data-game-id="${escapeAttr(ev.id)}" data-rsvp-child-id="${escapeAttr(defaultChildId)}" onclick="submitCalendarRsvpFromButton(this, 'maybe')" class="rsvp-btn rsvp-maybe flex-1 px-2 py-1.5 text-xs font-semibold rounded-lg border transition ${locked ? 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed' : (ev.myRsvp === 'maybe' ? 'bg-yellow-500 text-white border-yellow-500' : 'bg-white text-yellow-700 border-yellow-300 hover:bg-yellow-50')}">Maybe</button>
                        <button ${locked ? 'disabled aria-disabled="true"' : ''} data-team-id="${escapeAttr(ev.teamId)}" data-game-id="${escapeAttr(ev.id)}" data-rsvp-child-id="${escapeAttr(defaultChildId)}" onclick="submitCalendarRsvpFromButton(this, 'not_going')" class="rsvp-btn rsvp-not-going flex-1 px-2 py-1.5 text-xs font-semibold rounded-lg border transition ${locked ? 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed' : (ev.myRsvp === 'not_going' ? 'bg-red-500 text-white border-red-500' : 'bg-white text-red-700 border-red-300 hover:bg-red-50')}">Can't Go</button>
                    </div>
                    ${lockCopy ? `<div class="mt-1 text-xs font-semibold text-amber-700">${escapeHtml(lockCopy)}</div>` : ''}
                    <div class="mt-1 text-xs text-gray-500">${summary}</div>
                    ${renderAvailabilityNotes(ev)}
                </div>
            `;
        }

        function submitCalendarRsvpFromButton(btn, response) {
            if (btn?.disabled) return;
            const teamId = btn?.dataset?.teamId || '';
            const gameId = btn?.dataset?.gameId || '';
            if (!teamId || !gameId) return;
            const selectedChildId = btn?.closest('[data-rsvp-container]')?.querySelector('[data-rsvp-child-selector="true"]')?.value || btn?.dataset?.rsvpChildId || '';
            submitCalendarRsvp(teamId, gameId, response, { selectedChildId });
        }

        async function init() {
            try {
                const user = await requireAuth();
                currentUser = user;
                currentUserId = user.uid;
                checkAuth((u) => renderHeader(document.getElementById('header-container'), u));

                const profile = await getUserProfile(user.uid);
                const email = user.email || profile?.email;
                const parentOf = Array.isArray(profile?.parentOf) ? profile.parentOf : [];
                linkedPlayersByTeam = buildLinkedPlayersByTeam(parentOf);

                // Load all teams the user has access to (coach + parent)
                const [coachTeams, parentTeams] = await Promise.all([
                    getUserTeamsWithAccess(user.uid, email),
                    getParentTeams(user.uid)
                ]);

                const teamsMap = new Map();
                [...coachTeams, ...parentTeams].forEach(t => teamsMap.set(t.id, t));
                const teams = Array.from(teamsMap.values());
                calendarTeams = teams;

                // Assign colors to teams
                teams.forEach((team, i) => {
                    teamColors[team.id] = colorPalette[i % colorPalette.length];
                });

                // Populate team filter
                const teamFilter = document.getElementById('team-filter');
                teams.forEach(team => {
                    const opt = document.createElement('option');
                    opt.value = team.id;
                    opt.textContent = team.name;
                    teamFilter.appendChild(opt);
                });

                // Load events from all teams
                const loadPromises = teams.map(async (team) => {
                    const games = await getGames(team.id);
                    const events = [];
                    const availabilityPreferences = normalizeAvailabilityPreferences(team.availabilityPreferences);
                    const isTeamAdmin = team.ownerId === currentUserId || (email && Array.isArray(team.adminEmails) && team.adminEmails.map(e => String(e).toLowerCase()).includes(String(email).toLowerCase())) || !!currentUser?.isAdmin;
                    const notesVisible = canViewAvailabilityNotes(availabilityPreferences, isTeamAdmin);

                    for (const game of games) {
                        if (game.isSeriesMaster && game.recurrence) {
                            // Expand recurring practice series — each occurrence gets its own
                            // RSVP path (masterId__instanceDate) so availability is per-date.
                            for (const occ of expandRecurrence(game)) {
                                events.push({
                                    id: `${occ.masterId}__${occ.instanceDate}`,
                                    teamId: team.id,
                                    teamName: team.name,
                                    teamColor: teamColors[team.id],
                                    type: 'practice',
                                    title: occ.title || 'Practice',
                                    date: occ.date instanceof Date ? occ.date : new Date(occ.date),
                                    end: occ.end || null, // Add this line
                                    location: occ.location || 'TBD',
                                    status: game.status,
                                    isHome: null,
                                    kitColor: null,
                                    arrivalTime: game.arrivalTime,
                                    notes: occ.notes,
                                    assignments: null,
                                    rsvpSummary: null,
                                    homeScore: null,
                                    awayScore: null,
                                    liveStatus: null,
                                    myRsvp: null,
                                    childId: game.childId || game.playerId || null,
                                    childIds: Array.isArray(game.childIds) && game.childIds.length > 0
                                        ? game.childIds
                                        : getLinkedPlayersForTeam(team.id).map((player) => player.playerId).filter(Boolean),
                                    availabilityPreferences,
                                    availabilityLocked: isAvailabilityLocked(occ.date, availabilityPreferences),
                                    availabilityNotes: [],
                                    notesVisible,
                                    isTeamAdmin,
                                    source: 'db'
                                });
                            }
                        } else {
                            const date = game.date?.toDate ? game.date.toDate() : new Date(game.date);
                            events.push({
                                id: game.id,
                                teamId: team.id,
                                teamName: team.name,
                                teamColor: teamColors[team.id],
                                type: game.type || 'game',
                                title: game.type === 'practice' ? (game.title || 'Practice') : `vs. ${game.opponent || 'TBD'}`,
                                date,
                                end: game.endDate?.toDate ? game.endDate.toDate() : (game.endDate ? new Date(game.endDate) : null), // Add this line
                                location: game.location || 'TBD',
                                status: game.status,
                                visibility: game.visibility,
                                isPublic: game.isPublic,
                                public: game.public,
                                isPrivate: game.isPrivate,
                                private: game.private,
                                shareable: game.shareable,
                                isShareable: game.isShareable,
                                publicCalendar: game.publicCalendar,
                                isHome: game.isHome,
                                kitColor: game.kitColor,
                                arrivalTime: game.arrivalTime,
                                notes: game.notes,
                                assignments: game.assignments,
                                rsvpSummary: game.rsvpSummary,
                                homeScore: game.homeScore,
                                awayScore: game.awayScore,
                                liveStatus: game.liveStatus,
                                myRsvp: null,
                                childId: game.childId || game.playerId || null,
                                childIds: Array.isArray(game.childIds) && game.childIds.length > 0
                                    ? game.childIds
                                    : getLinkedPlayersForTeam(team.id).map((player) => player.playerId).filter(Boolean),
                                availabilityPreferences,
                                availabilityLocked: isAvailabilityLocked(date, availabilityPreferences),
                                availabilityNotes: [],
                                notesVisible,
                                isTeamAdmin,
                                source: 'db'
                            });
                        }
                    }

                    // Load ICS calendar events
                    const calendarUrls = Array.isArray(team.calendarUrls) ? team.calendarUrls : [];
                    if (calendarUrls.length > 0) {
                        const trackedUids = await getTrackedCalendarEventUids(team.id, games);
                        for (const calUrl of calendarUrls) {
                            try {
                                const icsEvents = await fetchAndParseCalendar(calUrl);
                                events.push(...mergeGlobalCalendarIcsEvents({
                                    team,
                                    teamColor: teamColors[team.id],
                                    existingEvents: events,
                                    icsEvents,
                                    trackedUids,
                                    isTrackedCalendarEvent,
                                    buildGlobalCalendarIcsEvent
                                }));
                            } catch (e) {
                                console.warn('Failed to load ICS calendar:', e);
                            }
                        }
                    }

                    return events;
                });

                const results = await Promise.all(loadPromises);
                allEvents = results.flat().sort((a, b) => a.date - b.date);

                applyFilters();
            } catch (error) {
                console.error('Calendar init error:', error);
                document.getElementById('calendar-content').innerHTML = `<div class="text-center py-12 text-red-600">Error loading calendar: ${error.message}</div>`;
            }
        }

        function applyFilters() {
            const now = new Date();
            let rangeStart, rangeEnd;

            if (currentTimeRange === 'week') {
                rangeStart = new Date(now);
                rangeStart.setDate(rangeStart.getDate() - rangeStart.getDay());
                rangeEnd = new Date(rangeStart);
                rangeEnd.setDate(rangeEnd.getDate() + 7);
            } else if (currentTimeRange === 'month') {
                rangeStart = new Date(now.getFullYear(), now.getMonth(), 1);
                rangeEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);
            } else if (currentTimeRange === 'quarter') {
                rangeStart = new Date(now);
                rangeStart.setDate(rangeStart.getDate() - 30);
                rangeEnd = new Date(now);
                rangeEnd.setDate(rangeEnd.getDate() + 90);
            } else {
                rangeStart = new Date(0);
                rangeEnd = new Date(9999, 11, 31);
            }

            currentTeamFilter = document.getElementById('team-filter').value;

            filteredEvents = allEvents.filter(ev => {
                if (currentTimeRange !== 'all' && currentView !== 'calendar') {
                    if (ev.date < rangeStart || ev.date > rangeEnd) return false;
                }
                if (currentTypeFilter !== 'all' && ev.type !== currentTypeFilter) return false;
                if (currentTeamFilter && ev.teamId !== currentTeamFilter) return false;
                return true;
            });

            updatePublicGamesFeedButton();
            render();
        }

        function render() {
            if (currentView === 'detailed') renderDetailed();
            else if (currentView === 'compact') renderCompact();
            else if (currentView === 'calendar') renderCalendarGrid();

            document.getElementById('month-nav').classList.toggle('hidden', currentView !== 'calendar');
            hydrateRenderedRsvpEvents();
        }

        // ===== CALENDAR GRID VIEW =====
        function renderCalendarGrid() {
            const container = document.getElementById('calendar-content');
            const label = document.getElementById('month-label');
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            label.textContent = `${monthNames[calendarMonth]} ${calendarYear}`;

            const firstDay = new Date(calendarYear, calendarMonth, 1);
            const lastDay = new Date(calendarYear, calendarMonth + 1, 0);
            const startDow = firstDay.getDay();
            const daysInMonth = lastDay.getDate();

            // Get events for this month
            const monthStart = new Date(calendarYear, calendarMonth, 1);
            const monthEnd = new Date(calendarYear, calendarMonth + 1, 0, 23, 59, 59);
            const monthEvents = getCalendarViewEvents(monthStart, monthEnd);

            // Group events by day
            const eventsByDay = {};
            monthEvents.forEach(ev => {
                const day = ev.date.getDate();
                if (!eventsByDay[day]) eventsByDay[day] = [];
                eventsByDay[day].push(ev);
            });

            const today = new Date();
            const isCurrentMonth = today.getMonth() === calendarMonth && today.getFullYear() === calendarYear;

            // Day headers
            let html = '<div class="cal-grid bg-gray-50 border-b border-gray-200">';
            ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(d => {
                html += `<div class="text-center text-xs font-bold text-gray-500 py-2">${d}</div>`;
            });
            html += '</div>';

            // Calendar cells
            html += '<div class="cal-grid">';
            const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;

            for (let i = 0; i < totalCells; i++) {
                const dayNum = i - startDow + 1;
                const inMonth = dayNum >= 1 && dayNum <= daysInMonth;
                const isToday = isCurrentMonth && inMonth && dayNum === today.getDate();
                const dayEvents = inMonth ? (eventsByDay[dayNum] || []) : [];

                html += `<div class="cal-cell ${inMonth ? '' : 'other-month'} ${isToday ? 'today' : ''}" ${inMonth && dayEvents.length > 0 ? `onclick="openDayDetail(${calendarYear}, ${calendarMonth}, ${dayNum})"` : ''}>`;
                if (inMonth) {
                    html += `<div class="text-xs font-medium ${isToday ? 'text-primary-700 font-bold' : 'text-gray-700'} mb-1">${dayNum}</div>`;
                    html += '<div class="flex flex-wrap">';
                    dayEvents.slice(0, 6).forEach(ev => {
                        html += `<span class="cal-dot" style="background: ${ev.teamColor}" title="${escapeHtml(ev.title)}"></span>`;
                    });
                    if (dayEvents.length > 6) {
                        html += `<span class="text-[9px] text-gray-400">+${dayEvents.length - 6}</span>`;
                    }
                    html += '</div>';
                    // Show first event title on larger screens
                    if (dayEvents.length > 0) {
                        html += `<div class="hidden md:block text-[10px] text-gray-600 truncate mt-0.5">${escapeHtml(dayEvents[0].title)}</div>`;
                    }
                }
                html += '</div>';
            }
            html += '</div>';

            container.innerHTML = html;
        }

        function getDayDetailEvents(year, month, day) {
            const dayStart = new Date(year, month, day);
            const dayEnd = new Date(year, month, day, 23, 59, 59);
            return allEvents.filter(ev => {
                if (currentTypeFilter !== 'all' && ev.type !== currentTypeFilter) return false;
                if (currentTeamFilter && ev.teamId !== currentTeamFilter) return false;
                return ev.date >= dayStart && ev.date <= dayEnd;
            });
        }

        function renderDayDetailEvents(dayEvents, content) {
            if (dayEvents.length === 0) {
                content.innerHTML = '<p class="text-gray-500 text-center py-8">No events on this day.</p>';
            } else {
                content.innerHTML = dayEvents.map(ev => {
                    const timeStr = ev.date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                    const isCancelled = ev.status === 'cancelled';
                    return `
                    <div class="mb-4 p-4 rounded-lg border border-gray-200 ${isCancelled ? 'opacity-60' : ''}">
                        <div class="flex items-center gap-2 mb-2">
                            <div class="w-3 h-3 rounded-full" style="background: ${ev.teamColor}"></div>
                            <span class="text-xs font-semibold text-gray-500">${escapeHtml(ev.teamName)}</span>
                            <span class="text-xs font-bold uppercase ${ev.type === 'practice' ? 'text-amber-700' : 'text-primary-700'}">${ev.type}</span>
                            ${isCancelled ? '<span class="text-xs font-bold text-red-700 bg-red-100 px-2 py-0.5 rounded">CANCELLED</span>' : ''}
                        </div>
                        <div class="font-bold text-gray-900 ${isCancelled ? 'line-through' : ''}">${escapeHtml(ev.title)}</div>
                        <div class="text-sm text-gray-600 mt-1">${timeStr} · ${escapeHtml(ev.location)}</div>
                        ${ev.isHome === true ? '<span class="text-xs bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full font-semibold mr-1">HOME</span>' : ''}
                        ${ev.isHome === false ? '<span class="text-xs bg-gray-100 text-gray-700 px-2 py-0.5 rounded-full font-semibold mr-1">AWAY</span>' : ''}
                        ${ev.kitColor ? `<span class="text-xs bg-purple-100 text-purple-800 px-2 py-0.5 rounded-full font-semibold">${escapeHtml(ev.kitColor)}</span>` : ''}
                        ${ev.arrivalTime ? `<div class="text-xs text-amber-700 mt-1">Arrive: ${(() => { const at = ev.arrivalTime?.toDate ? ev.arrivalTime.toDate() : new Date(ev.arrivalTime); return at.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }); })()}</div>` : ''}
                        ${ev.notes ? `<div class="text-xs text-gray-500 mt-1 italic">${escapeHtml(ev.notes)}</div>` : ''}
                        ${ev.assignments && ev.assignments.length > 0 ? `<div class="mt-1 flex flex-wrap gap-1">${ev.assignments.map(a => `<span class="text-xs bg-gray-100 rounded px-2 py-0.5"><b>${escapeHtml(a.role)}:</b> ${escapeHtml(a.value || 'TBD')}</span>`).join('')}</div>` : ''}
                        ${renderRsvpBlock(ev)}
                    </div>`;
                }).join('');
            }
        }

        async function openDayDetail(year, month, day) {
            activeDayDetail = { year, month, day };
            const dayStart = new Date(year, month, day);
            const dayEvents = getDayDetailEvents(year, month, day);

            const modal = document.getElementById('day-modal');
            const title = document.getElementById('day-modal-title');
            const content = document.getElementById('day-modal-content');

            title.textContent = dayStart.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
            renderDayDetailEvents(dayEvents, content);

            modal.classList.remove('hidden');

            await hydrateRsvpEvents(dayEvents, { includeNotes: true, includeMissingSummary: true });
            if (activeDayDetail?.year === year && activeDayDetail?.month === month && activeDayDetail?.day === day && !modal.classList.contains('hidden')) {
                renderDayDetailEvents(getDayDetailEvents(year, month, day), content);
            }
        }

        function closeDayModal() {
            activeDayDetail = null;
            document.getElementById('day-modal').classList.add('hidden');
        }

        async function submitCalendarRsvp(teamId, gameId, response, childContext = {}) {
            try {
                const { playerIds, submitMode } = resolveCalendarRsvpSubmission(
                    linkedPlayersByTeam,
                    teamId,
                    childContext?.selectedChildId || ''
                );
                const summary = submitMode === 'player'
                    ? await submitRsvpForPlayer(teamId, gameId, currentUserId, {
                        displayName: currentUser?.displayName || currentUser?.email || null,
                        playerId: playerIds[0],
                        response
                    })
                    : await submitRsvp(teamId, gameId, currentUserId, {
                        displayName: currentUser?.displayName || currentUser?.email || null,
                        playerIds,
                        response
                    });
                allEvents.forEach(ev => {
                    if (ev.teamId === teamId && ev.id === gameId) {
                        ev.myRsvp = response;
                        if (summary) ev.rsvpSummary = summary;
                    }
                });
                applyFilters();
                const dayModal = document.getElementById('day-modal');
                if (currentView === 'calendar' && activeDayDetail && dayModal && !dayModal.classList.contains('hidden')) {
                    const existingHydration = getRsvpHydrationCacheEntry(teamId, gameId);
                    existingHydration.myRsvp = Promise.resolve(response);
                    if (summary) existingHydration.summary = Promise.resolve(summary);
                    await openDayDetail(activeDayDetail.year, activeDayDetail.month, activeDayDetail.day);
                }
            } catch (err) {
                alert('Failed to submit RSVP: ' + (err?.message || err));
            }
        }

            currentView = view;
            document.querySelectorAll('#view-detailed, #view-compact, #view-calendar').forEach(btn => {
                btn.className = btn.id === `view-${view}`
                    ? 'px-3 py-1.5 text-xs font-semibold bg-primary-600 text-white'
                    : 'px-3 py-1.5 text-xs font-semibold bg-white text-gray-600 hover:bg-gray-50';

            applyFilters();
        }

        function setTimeRange(range) {
            currentTimeRange = range;
            document.querySelectorAll('.time-range-btn').forEach(btn => {
                const isActive = btn.textContent.trim().toLowerCase() === range;
                btn.className = `time-range-btn px-3 py-1.5 text-xs font-semibold ${isActive ? 'bg-primary-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'}`;

            applyFilters();

        function setTypeFilter(type) {
            currentTypeFilter = type;
            document.querySelectorAll('.type-filter-btn').forEach(btn => {
                const label = btn.textContent.trim().toLowerCase();
                const btnType = label === 'games' ? 'game' : (label === 'practices' ? 'practice' : 'all');

            applyFilters();
        }

        function navMonth(delta) {
            calendarMonth += delta;
            if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
            if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
            render();
        }

        function getCalendarViewEvents(rangeStart, rangeEnd) {
            return allEvents.filter(ev => {
                if (currentTypeFilter !== 'all' && ev.type !== currentTypeFilter) return false;
                if (currentTeamFilter && ev.teamId !== currentTeamFilter) return false;
                return ev.date >= rangeStart && ev.date <= rangeEnd;
            });
        }

        function getVisibleExportEvents() {
            if (currentView !== 'calendar') {
                return filteredEvents;
            }

            const monthStart = new Date(calendarYear, calendarMonth, 1);
            const monthEnd = new Date(calendarYear, calendarMonth + 1, 0, 23, 59, 59);
            return getCalendarViewEvents(monthStart, monthEnd);
        }

        function getCalendarPrintEvents() {
            return (allEvents || []).filter((event) => {
                if (currentTeamFilter && event.teamId !== currentTeamFilter) return false;
                return !event.isCancelled && event.status !== 'cancelled';
            });
        }

        function getCalendarPrintTitle() {
            if (!currentTeamFilter) return 'All teams';
            return allEvents.find((event) => event.teamId === currentTeamFilter)?.teamName || 'Selected team';
        }

        function printCurrentSchedule() {
            const options = getDefaultSchedulePrintOptions();
            const selectedTeam = getCalendarPrintTitle();
            printSchedule(getCalendarPrintEvents(), {
                ...options,
                title: `${selectedTeam || 'All teams'} schedule`,
                teamName: selectedTeam || '',
                noEventsMessage: 'No upcoming schedule events in the next 30 days. Open Print Options to choose a custom date range or event type.'
            });
        }

        function printCurrentScheduleOptions() {
            const options = promptSchedulePrintOptions(getDefaultSchedulePrintOptions());
            if (!options) return;
            const selectedTeam = getCalendarPrintTitle();
            printSchedule(getCalendarPrintEvents(), {
                ...options,
                title: `${selectedTeam || 'All teams'} schedule`,
                teamName: selectedTeam || ''
            });
        }

        function getSelectedSyncCalendarTeam() {
            if (currentTeamFilter) {
                return calendarTeams.find((team) => team.id === currentTeamFilter) || null;
            }
            const visibleTeamIds = new Set((allEvents || []).map((event) => event.teamId).filter(Boolean));
            const candidateTeams = calendarTeams.filter((team) => visibleTeamIds.size === 0 || visibleTeamIds.has(team.id));
            return candidateTeams.length === 1 ? candidateTeams[0] : null;
        }

        function getPrivateCalendarFeedUrl(team) {
            const directUrl = team?.privateCalendarFeedUrl ||
                team?.calendarSubscriptionUrl ||
                team?.calendarFeedUrl ||
                team?.teamCalendarFeedUrl;
            if (typeof directUrl === 'string' && directUrl.trim()) {
                return directUrl.trim().replace(/^webcal:\/\//i, 'https://');
            }

            const token = team?.calendarSubscriptionToken ||
                team?.privateCalendarToken ||
                team?.calendarFeedToken ||
                team?.teamCalendarToken;
            if (!token || !team?.id) return '';

            const configuredUrl = window.__ALLPLAYS_CONFIG__?.teamCalendarFeedFunctionUrl || window.ALLPLAYS_TEAM_CALENDAR_FEED_URL;
            const fallbackUrl = window.__ALLPLAYS_CONFIG__?.calendarFetchFunctionUrl || window.ALLPLAYS_CALENDAR_FUNCTION_URL;
            const baseUrl = (typeof configuredUrl === 'string' && configuredUrl.trim())
                ? configuredUrl.trim()
                : (typeof fallbackUrl === 'string' && fallbackUrl.includes('fetchCalendarIcs')
                    ? fallbackUrl.replace('fetchCalendarIcs', 'teamCalendarFeed')
                    : 'https://us-central1-all-plays-prod.cloudfunctions.net/teamCalendarFeed');
            const separator = baseUrl.includes('?') ? '&' : '?';
            return `${baseUrl}${separator}teamId=${encodeURIComponent(team.id)}&token=${encodeURIComponent(token)}`;
        }

        function getAppleCalendarFeedUrl(feedUrl) {
            return feedUrl.replace(/^https?:\/\//i, 'webcal://');
        }

        function getGoogleCalendarFeedUrl(feedUrl) {
            return `https://calendar.google.com/calendar/render?cid=${encodeURIComponent(feedUrl)}`;
        }

        function setSyncCalendarFeedback(message, tone = 'neutral') {
            const feedback = document.getElementById('sync-calendar-feedback');
            if (!feedback) return;
            feedback.textContent = message;
            feedback.className = `text-sm ${tone === 'error' ? 'text-red-600' : tone === 'success' ? 'text-emerald-700' : 'text-gray-600'}`;
        }

        function getCurrentCalendarFeedUrl() {
            const team = getSelectedSyncCalendarTeam();
            return team ? getPrivateCalendarFeedUrl(team) : '';
        }

        function openSyncCalendarModal() {
            const team = getSelectedSyncCalendarTeam();
            const feedUrl = team ? getPrivateCalendarFeedUrl(team) : '';
            document.getElementById('sync-calendar-modal')?.classList.remove('hidden');
            if (!team) {
                setSyncCalendarFeedback('Select a team before opening a live calendar subscription.', 'error');
                return;
            }
            setSyncCalendarFeedback(feedUrl ? `Choose where to subscribe to ${team.name || 'this team'} schedule.` : 'Calendar subscription link is not available yet.', feedUrl ? 'neutral' : 'error');
        }

        function closeSyncCalendarModal() {
            document.getElementById('sync-calendar-modal')?.classList.add('hidden');
        }

        async function copyPrivateCalendarFeedUrl(feedUrl) {
            if (!feedUrl) {
                setSyncCalendarFeedback('Calendar subscription link is not available yet.', 'error');
                return;
            }
            try {
                if (navigator.clipboard?.writeText) {
                    await navigator.clipboard.writeText(feedUrl);
                } else {
                    const input = document.createElement('textarea');
                    input.value = feedUrl;
                    input.setAttribute('readonly', '');
                    input.style.position = 'fixed';
                    input.style.left = '-9999px';
                    document.body.appendChild(input);
                    input.select();
                    const copied = document.execCommand('copy');
                    document.body.removeChild(input);
                    if (!copied) throw new Error('Copy command failed');
                }
                setSyncCalendarFeedback('Subscription link copied.', 'success');
            } catch (error) {
                console.error('Failed to copy calendar feed URL:', error);
                setSyncCalendarFeedback('Could not copy the link. Select Copy Link again or try manually.', 'error');
            }
        }

        function isShareableFanGame(game = {}) {
            const visibility = String(game?.visibility || '').toLowerCase();
            if (visibility === 'private' || game?.isPrivate === true || game?.private === true) return false;
            return visibility === 'public' ||
                game?.isPublic === true ||
                game?.public === true ||
                game?.shareable === true ||
                game?.isShareable === true ||
                game?.publicCalendar === true;
        }

        function isPublicFanFeedGame(team = {}, game = {}) {
            if (String(game?.type || 'game').toLowerCase() !== 'game') return false;
            if (String(game?.visibility || '').toLowerCase() === 'private') return false;
            if (game?.isPrivate === true || game?.private === true) return false;
            if (String(game?.status || '').toLowerCase() === 'deleted') return false;
            if (String(game?.liveStatus || '').toLowerCase() === 'deleted') return false;
            return (team?.isPublic !== false && team?.active !== false) || isShareableFanGame(game);
        }

        function getSelectedPublicGamesFeedTeam() {
            if (!currentTeamFilter) return null;
            return calendarTeams.find((team) => team.id === currentTeamFilter) || null;
        }

        function canExposePublicFanFeed(team = {}) {
            if (!team?.id) return false;
            return (allEvents || []).some((event) => event.teamId === team.id && isPublicFanFeedGame(team, event));
        }

        function getPublicGamesFeedUrl(team) {
            if (!team?.id) return '';
            const configuredUrl = window.__ALLPLAYS_CONFIG__?.publicTeamGamesIcsFunctionUrl || window.ALLPLAYS_PUBLIC_GAMES_ICS_URL;
            const fallbackUrl = window.__ALLPLAYS_CONFIG__?.calendarFetchFunctionUrl || window.ALLPLAYS_CALENDAR_FUNCTION_URL;
            const baseUrl = (typeof configuredUrl === 'string' && configuredUrl.trim())
                ? configuredUrl.trim()
                : (typeof fallbackUrl === 'string' && fallbackUrl.includes('fetchCalendarIcs')
                    ? fallbackUrl.replace('fetchCalendarIcs', 'publicTeamGamesIcs')
                    : 'https://us-central1-all-plays-prod.cloudfunctions.net/publicTeamGamesIcs');
            const separator = baseUrl.includes('?') ? '&' : '?';
            return `${baseUrl}${separator}teamId=${encodeURIComponent(team.id)}`;
        }

        function updatePublicGamesFeedButton() {
            const button = document.getElementById('public-games-feed');
            if (!button) return;
            const team = getSelectedPublicGamesFeedTeam();
            button.hidden = !team || !canExposePublicFanFeed(team);
        }

        async function copyPublicGamesFeedUrl() {
            const team = getSelectedPublicGamesFeedTeam();
            const feedUrl = team ? getPublicGamesFeedUrl(team) : '';
            if (!team || !feedUrl || !canExposePublicFanFeed(team)) {
                alert('Select a team with public games before copying the Fan Feed link.');
                return;
            }
            try {
                if (navigator.share) {
                    await navigator.share({
                        title: `${team.name || 'Team'} public games`,
                        text: 'Subscribe to the public games-only calendar feed.',
                        url: feedUrl
                    });
                    return;
                }
                if (navigator.clipboard?.writeText) {
                    await navigator.clipboard.writeText(feedUrl);
                } else {
                    const input = document.createElement('textarea');
                    input.value = feedUrl;
                    input.setAttribute('readonly', '');
                    input.style.position = 'fixed';
                    input.style.left = '-9999px';
                    document.body.appendChild(input);
                    input.select();
                    const copied = document.execCommand('copy');
                    document.body.removeChild(input);
                    if (!copied) throw new Error('Copy command failed');
                }
                alert('Fan Feed URL copied.');
            } catch (error) {
                console.error('Failed to copy public games feed URL:', error);
                alert('Could not copy the Fan Feed link.');
            }
        }

        document.getElementById('sync-calendar-apple')?.addEventListener('click', () => {
            const feedUrl = getCurrentCalendarFeedUrl();
            if (!feedUrl) {
                setSyncCalendarFeedback('Calendar subscription link is not available yet.', 'error');
                return;
            }
            window.open(getAppleCalendarFeedUrl(feedUrl), '_blank', 'noopener');
            setSyncCalendarFeedback('Opening Apple Calendar subscription.', 'success');
        });
        document.getElementById('sync-calendar-google')?.addEventListener('click', () => {
            const feedUrl = getCurrentCalendarFeedUrl();
            if (!feedUrl) {
                setSyncCalendarFeedback('Calendar subscription link is not available yet.', 'error');
                return;
            }
            window.open(getGoogleCalendarFeedUrl(feedUrl), '_blank', 'noopener');
            setSyncCalendarFeedback('Opening Google Calendar subscription.', 'success');
        });
        document.getElementById('sync-calendar-copy')?.addEventListener('click', () => {
            copyPrivateCalendarFeedUrl(getCurrentCalendarFeedUrl());
        });
        document.getElementById('public-games-feed')?.addEventListener('click', copyPublicGamesFeedUrl);

        // ===== ICS EXPORT =====
        function exportIcs() {
            const exportEvents = getVisibleExportEvents();
            if (exportEvents.length === 0) {
                alert('No events to export.');
                return;
            }

            const lines = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//ALL PLAYS//EN'];
            const pad = (n) => String(n).padStart(2, '0');
            const fmtDate = (d) => `${d.getUTCFullYear()}${pad(d.getUTCMonth() + 1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}${pad(d.getUTCSeconds())}Z`;
            const escapeIcsText = (value) => String(value || '')
                .replace(/\\/g, '\\\\')
                .replace(/;/g, '\\;')
                .replace(/,/g, '\\,')
                .replace(/\r?\n/g, '\\n');

            const seen = new Set();
            exportEvents.forEach(ev => {
                const dedupeKey = `${ev.teamId || ''}::${ev.id || ''}::${ev.date?.getTime?.() || ''}::${ev.type || ''}`;
                if (seen.has(dedupeKey)) return;
                seen.add(dedupeKey);
                const start = fmtDate(ev.date);
                let endDate = null;
                // Attempt to resolve ev.end into a valid Date object if it exists
                if (ev.end) {
                    let potentialDate = ev.end;
                    if (!(potentialDate instanceof Date)) {
                        if (typeof potentialDate === 'string') {
                            potentialDate = new Date(potentialDate);
                        } else if (typeof potentialDate === 'object' && potentialDate !== null && typeof potentialDate.toDate === 'function') {
                            potentialDate = potentialDate.toDate(); // Assume Firebase Timestamp-like
                        }
                    }
                    if (potentialDate instanceof Date && !isNaN(potentialDate)) {
                        endDate = potentialDate;
                    }
                }

                // If endDate is still not a valid Date, apply default duration
                if (!(endDate instanceof Date) || isNaN(endDate)) {
                    let durationMs = 60 * 60 * 1000; // Default 1 hour
                    if (ev.type === 'game') {
                        durationMs = 2 * 60 * 60 * 1000; // 2 hours for games
                    }
                    endDate = new Date(ev.date.getTime() + durationMs);
                }
                const end = fmtDate(endDate);
                lines.push(
                    'BEGIN:VEVENT',
                    `UID:${dedupeKey}@allplays`,
                    `DTSTAMP:${fmtDate(new Date())}`,
                    `DTSTART:${start}`,
                    `DTEND:${end}`,
                    `SUMMARY:${escapeIcsText(`${ev.teamName} - ${ev.title}`)}`,
                    `LOCATION:${escapeIcsText(ev.location || '')}`,
                    'END:VEVENT'
                );
            });
            lines.push('END:VCALENDAR');

            const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'allplays-calendar.ics';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        init();
    </script>
