    <script type="module">
        import { getTeams, getUserTeamsWithAccess, getParentTeams, deleteTeam, getUserProfile, getUnreadChatCounts } from './js/db.js?v=63';
        import { renderHeader, renderFooter, escapeHtml } from './js/utils.js?v=8';
        import { checkAuth } from './js/auth.js?v=32';

        renderFooter(document.getElementById('footer-container'));

        function requireSyncedAuth() {
            return new Promise((resolve, reject) => {
                let unsubscribe = null;
                let cleanupRequestedBeforeSubscribeReturned = false;
                let settled = false;

                function cleanup() {
                    if (typeof unsubscribe === 'function') {
                        const stop = unsubscribe;
                        unsubscribe = null;
                        cleanupRequestedBeforeSubscribeReturned = false;
                        stop();
                    } else {
                        cleanupRequestedBeforeSubscribeReturned = true;
                    }
                }

                unsubscribe = checkAuth((user) => {
                    if (settled) return;
                    settled = true;
                    cleanup();
                    if (user) {
                        resolve(user);
                    } else {
                        window.location.href = 'login.html';
                        reject('Not authenticated');
                    }
                });

                if (cleanupRequestedBeforeSubscribeReturned) {
                    cleanup();
                }
            });
        }

        async function init() {
            try {
                const user = await requireSyncedAuth();

                // Load user profile to get isAdmin flag
                let profile = null;
                try {
                    profile = await getUserProfile(user.uid);
                    if (profile && profile.isAdmin) {
                        user.isAdmin = true;
                    }
                    if (profile?.email) {
                        user.profileEmail = profile.email;
                        if (!user.email) {
                            user.email = profile.email;
                        }
                    }
                } catch (e) {
                    console.error('Error loading user profile:', e);
                }

                renderHeader(document.getElementById('header-container'), user);

                const canManageAllTeams = user.isAdmin === true;
                const [coachTeams, parentTeams] = await Promise.all([
                    canManageAllTeams
                        ? getTeams({ includePrivate: true })
                        : getUserTeamsWithAccess(user.uid, user.email || profile?.email),
                    getParentTeams(user.uid)
                ]);

                const fullAccessMap = new Map();
                coachTeams.forEach(t => {
                    fullAccessMap.set(t.id, { ...t, _access: 'full' });
                });

                const parentOnlyTeams = [];
                parentTeams.forEach(t => {
                    if (fullAccessMap.has(t.id)) return;
                    parentOnlyTeams.push({ ...t, _access: 'parent' });
                });

                const fullAccessTeams = Array.from(fullAccessMap.values());
                const container = document.getElementById('my-teams-list');
                const subtitle = document.getElementById('my-teams-subtitle');
                const createTeamCta = document.getElementById('create-team-cta');
                const parentDashboardCta = document.getElementById('parent-dashboard-cta');

                if (fullAccessTeams.length === 0 && parentOnlyTeams.length > 0) {
                    if (subtitle) {
                        subtitle.textContent = 'Parent-linked teams stay read-only here. Use Parent Dashboard for family tasks and quick team access.';
                    }
                    createTeamCta?.classList.add('hidden');
                    parentDashboardCta?.classList.remove('hidden');
                }

                // Fetch unread chat counts for all teams
                const allTeams = [...fullAccessTeams, ...parentOnlyTeams];
                const teamIds = allTeams.map(t => t.id);
                const unreadCounts = teamIds.length > 0 ? await getUnreadChatCounts(user.uid, teamIds) : {};

                function renderTeamCard(team) {
                    const hasFullAccess = team._access === 'full';
                    const unread = unreadCounts[team.id] || 0;

                if (fullAccessTeams.length === 0 && parentOnlyTeams.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-16 bg-white rounded-2xl shadow-md border border-gray-200">

                            </svg>
                            <h3 class="text-xl font-bold text-gray-900 mb-3">No Teams Yet</h3>
                            <p class="text-gray-600 mb-6 max-w-md mx-auto">Create your first team to start tracking stats, managing schedules, and building a winning program.</p>

                                </svg>
                                Create Your First Team
                            </a>
                        </div>
                    `;
                    return;
                }

                    const unreadBadge = unread > 0
                        ? `<span class="absolute -top-1 -right-1 inline-flex items-center justify-center w-5 h-5 text-xs font-bold text-white bg-red-500 rounded-full">${unread > 99 ? '99+' : unread}</span>`
                        : '';
                    const chatHighlight = unread > 0 ? 'border-primary-400 bg-primary-50' : 'border-gray-200 hover:border-primary-300 hover:bg-primary-50';
                    return `
                    <div class="group bg-white rounded-2xl shadow-md hover:shadow-xl transition duration-300 border border-gray-200 hover:border-primary-300 overflow-hidden" data-team-card="${team.id}">

                                    : `<div class="w-20 h-20 rounded-xl bg-gradient-to-br from-primary-100 to-primary-200 flex items-center justify-center border-2 border-gray-200 group-hover:border-primary-400 transition shadow-md">
                                        <span class="text-3xl font-bold text-primary-600">${escapeHtml(team.name.charAt(0))}</span>
                                    </div>`
                                }
                                <div class="flex-grow">
                                    <h2 class="text-2xl font-bold mb-1">
                                        <a href="team.html#teamId=${team.id}" class="text-gray-900 hover:text-primary-600 transition">${escapeHtml(team.name)}</a>
                                    </h2>
                                    <div class="flex items-center gap-2">
                                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-primary-100 text-primary-800">
                                            ${escapeHtml(team.sport || 'Sport not set')}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Quick Actions -->
                        <div class="p-6">
                            <div class="grid grid-cols-2 sm:grid-cols-5 gap-2 mb-4">
                                <a href="team.html#teamId=${team.id}"
                                   class="flex flex-col items-center justify-center p-3 rounded-lg border border-gray-200 hover:border-primary-300 hover:bg-primary-50 transition group/btn">
                                    <svg class="w-5 h-5 text-gray-600 group-hover/btn:text-primary-600 transition mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                    </svg>
                                    <span class="text-xs font-medium text-gray-600 group-hover/btn:text-primary-700">View</span>
                                </a>
                                <a href="team-chat.html#teamId=${team.id}"
                                   class="relative flex flex-col items-center justify-center p-3 rounded-lg border ${chatHighlight} transition group/btn">
                                    ${unreadBadge}
                                    <svg class="w-5 h-5 ${unread > 0 ? 'text-primary-600' : 'text-gray-600 group-hover/btn:text-primary-600'} transition mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                                    </svg>
                                    <span class="text-xs font-medium ${unread > 0 ? 'text-primary-700' : 'text-gray-600 group-hover/btn:text-primary-700'}">Chat</span>
                                </a>
                                <a href="team-media.html#teamId=${team.id}"
                                   class="flex flex-col items-center justify-center p-3 rounded-lg border border-gray-200 hover:border-primary-300 hover:bg-primary-50 transition group/btn">
                                    <svg class="w-5 h-5 text-gray-600 group-hover/btn:text-primary-600 transition mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                    </svg>
                                    <span class="text-xs font-medium text-gray-600 group-hover/btn:text-primary-700">Media</span>
                                </a>
                                ${hasFullAccess ? `
                                <a href="edit-team.html#teamId=${team.id}"
                                   class="flex flex-col items-center justify-center p-3 rounded-lg border border-gray-200 hover:border-primary-300 hover:bg-primary-50 transition group/btn">
                                    <svg class="w-5 h-5 text-gray-600 group-hover/btn:text-primary-600 transition mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                    </svg>
                                    <span class="text-xs font-medium text-gray-600 group-hover/btn:text-primary-700">Edit</span>
                                </a>
                                <a href="edit-roster.html#teamId=${team.id}"
                                   class="flex flex-col items-center justify-center p-3 rounded-lg border border-gray-200 hover:border-primary-300 hover:bg-primary-50 transition group/btn">
                                    <svg class="w-5 h-5 text-gray-600 group-hover/btn:text-primary-600 transition mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                                    </svg>
                                    <span class="text-xs font-medium text-gray-600 group-hover/btn:text-primary-700">Roster</span>
                                </a>
                                <a href="edit-schedule.html#teamId=${team.id}"
                                   class="flex flex-col items-center justify-center p-3 rounded-lg border border-gray-200 hover:border-primary-300 hover:bg-primary-50 transition group/btn">
                                    <svg class="w-5 h-5 text-gray-600 group-hover/btn:text-primary-600 transition mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                    </svg>
                                    <span class="text-xs font-medium text-gray-600 group-hover/btn:text-primary-700">Schedule</span>
                                </a>
                                <a href="game-plan.html#teamId=${team.id}"
                                   class="flex flex-col items-center justify-center p-3 rounded-lg border border-gray-200 hover:border-primary-300 hover:bg-primary-50 transition group/btn">
                                    <svg class="w-5 h-5 text-gray-600 group-hover/btn:text-primary-600 transition mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
                                    </svg>
                                    <span class="text-xs font-medium text-gray-600 group-hover/btn:text-primary-700">Game Plan</span>
                                </a>
                                <a href="edit-config.html#teamId=${team.id}"
                                   class="flex flex-col items-center justify-center p-3 rounded-lg border border-gray-200 hover:border-primary-300 hover:bg-primary-50 transition group/btn">
                                    <svg class="w-5 h-5 text-gray-600 group-hover/btn:text-primary-600 transition mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    </svg>
                                    <span class="text-xs font-medium text-gray-600 group-hover/btn:text-primary-700">Stats</span>
                                </a>
                                <a href="certificates.html#teamId=${team.id}"
                                   class="flex flex-col items-center justify-center p-3 rounded-lg border border-gray-200 hover:border-primary-300 hover:bg-primary-50 transition group/btn">
                                    <svg class="w-5 h-5 text-gray-600 group-hover/btn:text-primary-600 transition mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 4h8a2 2 0 012 2v14l-4-2-4 2-4-2-4 2V6a2 2 0 012-2z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 8h8M8 12h5"></path>
                                    </svg>
                                    <span class="text-xs font-medium text-gray-600 group-hover/btn:text-primary-700">Certificates</span>
                                </a>
                                <a href="drills.html#teamId=${team.id}"
                                   class="flex flex-col items-center justify-center p-3 rounded-lg border border-gray-200 hover:border-primary-300 hover:bg-primary-50 transition group/btn">
                                    <svg class="w-5 h-5 text-gray-600 group-hover/btn:text-primary-600 transition mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
                                    </svg>
                                    <span class="text-xs font-medium text-gray-600 group-hover/btn:text-primary-700">Drills</span>
                                </a>
                                <a href="team-fees.html#teamId=${team.id}"
                                   class="flex flex-col items-center justify-center p-3 rounded-lg border border-amber-200 hover:border-amber-300 hover:bg-amber-50 transition group/btn">
                                    <svg class="w-5 h-5 text-gray-600 group-hover/btn:text-amber-600 transition mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 14l6-6m-5.5.5h.01m5.99 5h.01M5 5h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2z"></path>

                                   class="flex flex-col items-center justify-center p-3 rounded-lg border border-emerald-200 hover:border-emerald-300 hover:bg-emerald-50 transition group/btn">
                                    <svg class="w-5 h-5 text-gray-600 group-hover/btn:text-emerald-600 transition mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2m-4 0a2 2 0 012-2h2a2 2 0 012 2m-6 4l2 2 4-4m-6 8h6"></path>
                                    </svg>
                                    <span class="text-xs font-medium text-gray-600 group-hover/btn:text-emerald-700">Tracking</span>

                                ` : `

                                <div class="hidden sm:block"></div>
                                ` }
                            </div>

                            <!-- Delete Button -->
                            ${team.ownerId === user.uid ? `

                                        class="delete-team-btn w-full flex items-center justify-center gap-2 px-4 py-2.5 border-2 border-red-200 text-red-600 rounded-lg text-sm font-medium hover:bg-red-50 hover:border-red-300 transition">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                    Delete Team
                                </button>
                            ` : `
                                <div class="w-full text-center text-xs text-gray-400 border-2 border-dashed border-gray-200 rounded-lg py-2.5">
                                    ${hasFullAccess ? 'Owner-managed' : 'Parent view only'}
                                </div>
                            `}
                        </div>
                    </div>
                `;
                }

                function attachDeleteHandlers(el) {
                    el.querySelectorAll('.delete-team-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const buttonEl = e.currentTarget;
                            const teamId = buttonEl.dataset.teamId;
                            const teamName = buttonEl.dataset.teamName;
                            if (!confirm(`Deactivate team "${teamName}"? Team data will be retained for history.`)) return;
                            const card = buttonEl.closest('[data-team-card]');
                            const originalText = buttonEl.textContent;
                            buttonEl.disabled = true;
                            buttonEl.textContent = 'Deactivating...';
                            try {
                                await deleteTeam(teamId);
                                if (card) card.remove();
                            } catch (err) {
                                console.error('Deactivate team failed', err);
                                alert('Error deactivating team. ' + (err?.message || 'Please try again.'));
                                buttonEl.disabled = false;
                                buttonEl.textContent = originalText;
                            }
                        });
                    });
                }

                if (fullAccessTeams.length === 0 && parentOnlyTeams.length > 0) {
                    container.innerHTML = `
                        <div id="parent-only-notice" class="rounded-xl bg-amber-50 border border-amber-200 p-4 mb-6">
                            <p class="text-sm font-semibold text-amber-800">Parent view only — you are linked as a parent on these teams. Visit the <a href="parent-dashboard.html" class="underline hover:text-amber-900">Parent Dashboard</a> for family-focused tools.</p>
                        </div>
                        <div id="parent-only-teams-grid" class="space-y-6">
                            ${parentOnlyTeams.map(team => renderTeamCard(team)).join('')}
                        </div>
                    `;
                    attachDeleteHandlers(container);
                } else {
                    const parentSection = fullAccessTeams.length > 0 && parentOnlyTeams.length > 0 ? `
                        <div id="parent-teams-section" class="mt-6">
                            <button id="parent-teams-toggle" type="button" aria-expanded="false" aria-controls="parent-teams-collapsible"
                                class="flex items-center gap-2 text-sm font-semibold text-amber-700 hover:text-amber-900 transition">
                                <svg id="parent-teams-chevron" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                </svg>
                                Parent view only (${parentOnlyTeams.length})
                            </button>
                            <div id="parent-teams-collapsible" class="hidden mt-4 space-y-6">
                                ${parentOnlyTeams.map(team => renderTeamCard(team)).join('')}
                            </div>
                        </div>
                    ` : '';

                    container.innerHTML = `
                        <div id="full-access-teams-grid" class="space-y-6">
                            ${fullAccessTeams.map(team => renderTeamCard(team)).join('')}
                        </div>
                        ${parentSection}
                    `;
                    attachDeleteHandlers(container);

                    const toggle = container.querySelector('#parent-teams-toggle');
                    const collapsible = container.querySelector('#parent-teams-collapsible');
                    const chevron = container.querySelector('#parent-teams-chevron');
                    if (toggle && collapsible) {
                        toggle.addEventListener('click', () => {
                            const isExpanded = toggle.getAttribute('aria-expanded') === 'true';
                            toggle.setAttribute('aria-expanded', String(!isExpanded));
                            collapsible.classList.toggle('hidden', isExpanded);
                            if (chevron) chevron.style.transform = isExpanded ? '' : 'rotate(90deg)';
                        });
                    }
                }

            } catch (error) {
                console.error(error);
                // requireAuth handles redirect
            }
        }

        init();
    </script>
</body>

</html>
