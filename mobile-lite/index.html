<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="allplays-app-mode" content="1">
    <meta name="theme-color" content="#0f766e">
    <title>ALL PLAYS</title>
    <link rel="stylesheet" href="./styles.css">
    <script id="allplays-app-mode-bootstrap">
        (() => {
            window.__ALLPLAYS_FORCE_APP_MODE__ = true;
            try {
                window.sessionStorage?.setItem('allplays-app-mode', '1');
            } catch (_) {}
        })();
    </script>
</head>
<body>
    <main class="app-shell">
        <section id="signed-out-view" class="auth-screen" aria-labelledby="auth-title">
            <div class="auth-card">
                <div class="brand-lockup">
                    <img src="./logo_small.png" alt="ALL PLAYS" class="brand-logo">
                    <div>
                        <p class="eyebrow">ALL PLAYS</p>
                        <h1 id="auth-title">Sign in</h1>
                    </div>
                </div>

                <form id="login-form" class="auth-form">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" autocomplete="email" required>

                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required>

                    <button id="login-button" type="submit">Sign In</button>
                    <button id="google-button" type="button" class="button secondary-button">Continue with Google</button>
                    <button id="reset-button" type="button" class="button ghost-button">Send Reset Email</button>
                </form>

                <p id="auth-message" class="message" aria-live="polite"></p>
            </div>
        </section>

        <section id="signed-in-view" class="launch-screen hidden" aria-live="polite">
            <div class="launch-card">
                <img src="./logo_small.png" alt="" class="brand-logo">
                <div>
                    <p class="eyebrow">ALL PLAYS</p>
                    <h1>Opening app</h1>
                    <p id="launch-message" class="message">Loading your dashboard...</p>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="./app.js"></script>
</body>
</html>
