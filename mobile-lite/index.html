<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4f46e5">
    <title>ALL PLAYS Lite</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="status-bar" aria-label="App status">
            <div class="brand-lockup">
                <img src="./logo_small.png" alt="ALL PLAYS" class="brand-logo">
                <div>
                    <p class="eyebrow">ALL PLAYS Lite</p>
                    <h1>Mobile auth proof</h1>
                </div>
            </div>
            <span id="platform-badge" class="badge">Checking</span>
        </section>

        <section id="signed-out-view" class="panel" aria-labelledby="auth-title">
            <div class="panel-header">
                <div>
                    <h2 id="auth-title">Sign in</h2>
                    <p>Use an existing ALL PLAYS email/password account.</p>
                </div>
            </div>

            <form id="login-form" class="auth-form">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>

                <button id="login-button" type="submit">Sign In</button>
                <button id="reset-button" type="button" class="secondary">Send Reset Email</button>
            </form>

            <p id="auth-message" class="message" aria-live="polite"></p>
        </section>

        <section id="signed-in-view" class="panel hidden" aria-labelledby="session-title">
            <div class="panel-header">
                <div>
                    <h2 id="session-title">Signed in</h2>
                    <p id="session-subtitle">Firebase session is active.</p>
                </div>
                <button id="logout-button" type="button" class="icon-button" aria-label="Sign out">×</button>
            </div>

            <div class="profile-grid">
                <div>
                    <span>Email</span>
                    <strong id="profile-email">-</strong>
                </div>
                <div>
                    <span>UID</span>
                    <strong id="profile-uid">-</strong>
                </div>
                <div>
                    <span>Roles</span>
                    <strong id="profile-roles">-</strong>
                </div>
                <div>
                    <span>Teams</span>
                    <strong id="profile-teams">-</strong>
                </div>
            </div>

            <section class="lite-dashboard" aria-labelledby="teams-title">
                <div class="dashboard-header">
                    <div>
                        <h2 id="teams-title">My Teams</h2>
                        <p>Loaded inside the native app session.</p>
                    </div>
                    <span id="teams-state" class="mini-badge">Loading</span>
                </div>
                <div id="teams-list" class="team-list" aria-live="polite"></div>
            </section>
        </section>

        <section class="diagnostics" aria-labelledby="diagnostics-title">
            <h2 id="diagnostics-title">Diagnostics</h2>
            <dl>
                <div>
                    <dt>Firebase</dt>
                    <dd id="firebase-state">Starting</dd>
                </div>
                <div>
                    <dt>Firestore profile</dt>
                    <dd id="profile-state">Waiting</dd>
                </div>
                <div>
                    <dt>Origin</dt>
                    <dd id="origin-state">-</dd>
                </div>
            </dl>
        </section>
    </main>

    <script type="module" src="./app.js"></script>
</body>
</html>
